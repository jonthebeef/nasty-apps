name: 2FAuth
slug: 2fauth
type: docker
description: Manage your 2FA tokens in a self-hosted web app
tagline: Two-factor authentication code manager
category: tools
developer:
  name: 2FAuth Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- '386'
- arm64
- arm
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8000
  host: 8000
  description: Service port 8000
  protocol: tcp
volumes:
- container: /2fauth
  description: Mount for /2fauth
  required: false
env: []
web_ui:
  port: 8000
  path: /
