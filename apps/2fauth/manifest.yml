name: 2FAuth
slug: 2fauth
type: docker
description: 2FAuth is a web based self-hosted alternative to One Time Passcode (OTP)
  generators like Google Authenticator, designed for both mobile and desktop.
tagline: A web app to manage your Two-Factor Authentication (2FA) accounts and generate
  their security codes
category: tools
developer:
  name: Bubka
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/2FAuth/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/2FAuth/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/2FAuth/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/2FAuth/screenshot-3.png
arch:
- amd64
- '386'
- arm64
- arm
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8000
  host: 8000
  description: Service port 8000
  protocol: tcp
volumes:
- container: /2fauth
  description: Mount for /2fauth
  required: false
env: []
web_ui:
  port: 8000
  path: /
