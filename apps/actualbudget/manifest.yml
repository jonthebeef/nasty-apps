name: ActualBudget
slug: actualbudget
type: docker
description: Track spending and manage budgets with a clean local-first interface
tagline: Privacy-focused budgeting app
category: tools
developer:
  name: ActualBudget Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 5006
  host: 15006
  description: Service port 5006
  protocol: tcp
volumes:
- container: /data
  description: App data storage
  required: true
env: []
web_ui:
  port: 15006
  path: /
