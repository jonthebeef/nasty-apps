name: AdGuardHome
slug: adguardhome
type: docker
description: DNS-level protection for all devices on your network
tagline: Network-wide ad and tracker blocker
category: network-and-dns
developer:
  name: AdGuardHome Project
  website: ''
icon: icon.png
screenshots: []
arch:
- '386'
- amd64
- arm
- arm64
- ppc64le
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 53
  host: 531
  description: DNS service
  protocol: tcp
- container: 53
  host: 531
  description: DNS service
  protocol: udp
- container: 3000
  host: 3001
  description: Service port 3000
  protocol: tcp
- container: 853
  host: 853
  description: Service port 853
  protocol: tcp
- container: 784
  host: 784
  description: Service port 784
  protocol: udp
volumes:
- container: /opt/adguardhome/work
  description: Mount for /opt/adguardhome/work
  required: false
- container: /opt/adguardhome/conf
  description: Mount for /opt/adguardhome/conf
  required: false
env: []
web_ui:
  port: 531
  path: /
