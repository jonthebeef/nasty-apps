name: Adminer
slug: adminer
type: docker
description: Manage MySQL, PostgreSQL, SQLite and more from a single PHP page
tagline: Lightweight database management tool
category: tools
developer:
  name: Tim Düsterhus
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm
- arm64
