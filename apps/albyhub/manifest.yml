name: AlbyHub
slug: albyhub
type: docker
description: 'Alby Hub is an open-source, self-custodial Bitcoin Lightning wallet,
  with the easiest-to-use Lightning Network node for everyone.

  Whether you''re an individual, creator, or developer, Alby Hub is your centre for
  seamless Bitcoin payments.

  Effortlessly connect to a variety of apps like the Alby Browser Extension or Alby
  Go mobile app, create sub-wallets for family and friends, and take full control
  of your funds—all within an intuitive interface and developer-ready APIs.


  **USEFUL LINKS**

  - [Source Repository](https://github.com/getAlby/hub)

  - [Support](https://support.getalby.com/)

  - [Marketing Site](https://albyhub.com/)

  - [Community of users and developers](https://discord.getalby.com)

  - [Feedback Board, feature requests, bug reports[(https://feedback.getalby.com)'
tagline: Self-custodial Bitcoin Lightning wallet with integrated node and app connections.
category: tools
developer:
  name: calganaygun
  website: ''
icon: https://cdn.jsdelivr.net/gh/getAlby/hub@master/frontend/public/icon-512.png
screenshots:
- https://cdn.jsdelivr.net/gh/getAlby/umbrel-community-app-store@master/alby-albyhub/images/node.png
- https://cdn.jsdelivr.net/gh/getAlby/umbrel-community-app-store@master/alby-albyhub/images/store.png
- https://cdn.jsdelivr.net/gh/getAlby/umbrel-community-app-store@master/alby-albyhub/images/wallet.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8080
  host: 58000
  description: Service port 8080
  protocol: tcp
volumes:
- container: /data
  description: App data storage
  required: true
env:
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
- name: UMASK
  default: '002'
  description: UMASK environment variable
  advanced: true
- name: WORK_DIR
  default: /data/albyhub
  description: WORK_DIR environment variable
  advanced: true
- name: LOG_EVENTS
  default: 'true'
  description: LOG_EVENTS environment variable
  advanced: true
web_ui:
  port: 58000
  path: /
