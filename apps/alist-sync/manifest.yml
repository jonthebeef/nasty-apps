name: Alist Sync
slug: alist-sync
type: docker
description: Sync files between multiple storage backends automatically
tagline: File synchronisation for AList
category: cloud-and-files
developer:
  name: xjxjin
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 52441
  host: 52441
  description: Service port 52441
  protocol: tcp
volumes:
- container: /app/data
  description: App data storage
  required: true
env:
- name: TZ
  default: Asia/Shanghai
  description: TZ environment variable
  advanced: true
web_ui:
  port: 52441
  path: /
