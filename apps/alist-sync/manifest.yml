name: Alist Sync
slug: alist-sync
type: docker
description: Alist Sync application imported from CasaOS catalog
tagline: Alist Sync application imported from CasaOS catalog
category: cloud-and-files
developer:
  name: xjxjin
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
