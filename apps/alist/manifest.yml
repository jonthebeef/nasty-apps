name: Alist
slug: alist
type: docker
description: Browse and manage files across local, cloud, and remote storage
tagline: Multi-storage file browser
category: cloud-and-files
developer:
  name: Xhofe
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 5244
  host: 5244
  description: Service port 5244
  protocol: tcp
volumes:
- container: /opt/alist/data
  description: App data storage
  required: true
env: []
web_ui:
  port: 5244
  path: /
