name: Anaconda3
slug: anaconda3
type: docker
description: Anaconda3 application imported from CasaOS catalog
tagline: Anaconda3 application imported from CasaOS catalog
category: tools
developer:
  name: LisonEvf
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 8888
    host: 8888
    description: Service port 8888
    protocol: tcp
volumes:
  - container: /opt/notebooks
    description: Mount for /opt/notebooks
    required: false
env:
  - name: LANG
    default: C.UTF-8
    description: LANG environment variable
    advanced: true
  - name: LC_ALL
    default: C.UTF-8
    description: LC_ALL environment variable
    advanced: true
  - name: PATH
    default: /opt/conda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    description: PATH environment variable
    advanced: true
web_ui:
  port: 8888
  path: /
