name: Anaconda3
slug: anaconda3
type: docker
description: Your machine learning Env work with Jupyter Lab
tagline: Your machine learning Env work with Jupyter Lab
category: tools
developer:
  name: LisonEvf
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Anaconda3/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Anaconda3/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Anaconda3/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Anaconda3/screenshot-3.png
arch:
- amd64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8888
  host: 8888
  description: Service port 8888
  protocol: tcp
volumes:
- container: /opt/notebooks
  description: Mount for /opt/notebooks
  required: false
env:
- name: LANG
  default: C.UTF-8
  description: LANG environment variable
  advanced: true
- name: LC_ALL
  default: C.UTF-8
  description: LC_ALL environment variable
  advanced: true
- name: PATH
  default: /opt/conda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  description: PATH environment variable
  advanced: true
web_ui:
  port: 8888
  path: /
