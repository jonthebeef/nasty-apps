name: AnythingLLM
slug: anythingllm
type: docker
description: Chat with documents using any LLM — local or cloud
tagline: All-in-one AI desktop app
category: tools
developer:
  name: Unknown
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3001
  host: 3051
  description: Service port 3001
  protocol: tcp
volumes:
- container: /app/server/storage
  description: Mount for /app/server/storage
  required: false
env: []
web_ui:
  port: 3051
  path: /
