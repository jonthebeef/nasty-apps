name: AnythingLLM
slug: anythingllm
type: docker
description: AnythingLLM is the easiest to use, all-in-one AI application that can
  do RAG, AI Agents, and much more with no code or infrastructure headaches.
tagline: The all-in-one AI application.
category: tools
developer:
  name: Mintplex Labs
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/AnythingLLM/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/AnythingLLM/screenshot-1.gif
arch:
- amd64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3001
  host: 3051
  description: Service port 3001
  protocol: tcp
volumes:
- container: /app/server/storage
  description: Mount for /app/server/storage
  required: false
env: []
web_ui:
  port: 3051
  path: /
