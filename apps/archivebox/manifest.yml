name: ArchiveBox
slug: archivebox
type: docker
description: Save web pages, PDFs, and media for offline access
tagline: Self-hosted web archiver
category: tools
developer:
  name: ArchiveBox
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/ArchiveBox/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/ArchiveBox/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/ArchiveBox/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/ArchiveBox/screenshot-3.png
arch:
- amd64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8000
  host: 18010
  description: Service port 8000
  protocol: tcp
volumes:
- container: /data
  description: App data storage
  required: true
env:
- name: ADMIN_USERNAME
  default: casaos
  description: ADMIN_USERNAME environment variable
  advanced: true
- name: ADMIN_PASSWORD
  default: casaos
  description: ADMIN_PASSWORD environment variable
  advanced: true
- name: ALLOWED_HOSTS
  default: '*'
  description: ALLOWED_HOSTS environment variable
  advanced: true
- name: CSRF_TRUSTED_ORIGINS
  default: '*'
  description: CSRF_TRUSTED_ORIGINS environment variable
  advanced: true
- name: PUBLIC_INDEX
  default: 'True'
  description: PUBLIC_INDEX environment variable
  advanced: true
- name: PUBLIC_SNAPSHOTS
  default: 'True'
  description: PUBLIC_SNAPSHOTS environment variable
  advanced: true
- name: PUBLIC_ADD_VIEW
  default: 'False'
  description: PUBLIC_ADD_VIEW environment variable
  advanced: true
- name: SEARCH_BACKEND_ENGINE
  default: sonic
  description: SEARCH_BACKEND_ENGINE environment variable
  advanced: true
- name: SEARCH_BACKEND_HOST_NAME
  default: archivebox_sonic
  description: SEARCH_BACKEND_HOST_NAME environment variable
  advanced: true
- name: SEARCH_BACKEND_PASSWORD
  default: SomeSecretPassword
  description: SEARCH_BACKEND_PASSWORD environment variable
  advanced: true
web_ui:
  port: 18010
  path: /
