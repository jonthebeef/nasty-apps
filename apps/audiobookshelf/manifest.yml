name: Audiobookshelf
slug: audiobookshelf
type: docker
description: Audiobookshelf application imported from CasaOS catalog
tagline: Audiobookshelf application imported from CasaOS catalog
category: media
developer:
  name: advplyr
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 80
    host: 13378
    description: Web interface
    protocol: tcp
volumes:
  - container: /audiobooks
    description: Mount for /audiobooks
    required: false
  - container: /podcasts
    description: Mount for /podcasts
    required: false
  - container: /config
    description: App configuration
    required: true
  - container: /metadata
    description: App data storage
    required: true
env: []
web_ui:
  port: 13378
  path: /
