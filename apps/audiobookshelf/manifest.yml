name: Audiobookshelf
slug: audiobookshelf
type: docker
description: Stream your audiobook and podcast library to any device
tagline: Audiobook and podcast server
category: media
developer:
  name: advplyr
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Audiobookshelf/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Audiobookshelf/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Audiobookshelf/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Audiobookshelf/screenshot-3.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 80
  host: 13378
  description: Web interface
  protocol: tcp
volumes:
- container: /audiobooks
  description: Mount for /audiobooks
  required: false
- container: /podcasts
  description: Mount for /podcasts
  required: false
- container: /config
  description: App configuration
  required: true
- container: /metadata
  description: App data storage
  required: true
env: []
web_ui:
  port: 13378
  path: /
