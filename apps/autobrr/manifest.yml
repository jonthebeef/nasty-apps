name: Autobrr
slug: autobrr
type: docker
description: Autobrr is the modern download automation tool for torrents and usenet.
  With inspiration and ideas from tools like trackarr, autodl-irssi and flexget we
  built one tool that can do it all, and then some.
tagline: Modern, easy to use download automation for torrents and usenet.
category: media
developer:
  name: Autobrr Team
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Autobrr/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Autobrr/screenshot-1.png
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 7474
  host: 7474
  description: Service port 7474
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
env:
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 7474
  path: /
