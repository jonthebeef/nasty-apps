name: Autobrr
slug: autobrr
type: docker
description: Monitor IRC and RSS feeds for new releases and auto-download
tagline: Torrent automation tool
category: media
developer:
  name: Autobrr Team
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 7474
  host: 7474
  description: Service port 7474
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
env:
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 7474
  path: /
