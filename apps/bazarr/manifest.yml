name: Bazarr
slug: bazarr
type: docker
description: Bazarr is a companion application to Sonarr and Radarr. It can manage
  and download subtitles based on your requirements. You define your preferences by
  TV show or movie and Bazarr takes care of everything for you.
tagline: Letter generators for Sonarr and Radarr
category: media
developer:
  name: Sabnzbd Team
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Bazarr/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Bazarr/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Bazarr/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Bazarr/screenshot-3.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Bazarr/screenshot-4.png
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 6767
  host: 6767
  description: Service port 6767
  protocol: tcp
volumes:
- container: /movies
  description: Mount for /movies
  required: false
- container: /tv
  description: Mount for /tv
  required: false
- container: /config
  description: App configuration
  required: true
env:
- name: PGID
  default: '1000'
  description: PGID environment variable
  advanced: true
- name: PUID
  default: '1000'
  description: PUID environment variable
  advanced: true
- name: TZ
  default: Europe/London
  description: TZ environment variable
  advanced: true
web_ui:
  port: 6767
  path: /
