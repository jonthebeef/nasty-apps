name: BeaverHabitTracker
slug: beaverhabittracker
type: docker
description: Track daily habits with streaks and statistics
tagline: Simple habit tracking app
category: tools
developer:
  name: daya0576
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/BeaverHabitTracker/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/BeaverHabitTracker/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/BeaverHabitTracker/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/BeaverHabitTracker/screenshot-3.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8080
  host: 15580
  description: Service port 8080
  protocol: tcp
volumes:
- container: /app/.user
  description: Mount for /app/.user
  required: false
env:
- name: HABITS_STORAGE
  default: USER_DISK
  description: HABITS_STORAGE environment variable
  advanced: true
- name: TRUSTED_LOCAL_EMAIL
  default: your@email.com
  description: TRUSTED_LOCAL_EMAIL environment variable
  advanced: true
- name: INDEX_HABIT_DATE_COLUMNS
  default: '5'
  description: INDEX_HABIT_DATE_COLUMNS environment variable
  advanced: true
- name: ENABLE_IOS_STANDALONE
  default: 'true'
  description: ENABLE_IOS_STANDALONE environment variable
  advanced: true
web_ui:
  port: 15580
  path: /
