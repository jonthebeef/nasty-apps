name: Calibre Web
slug: calibre-web
type: docker
description: Calibre-web is a web app providing a clean interface for browsing, reading
  and downloading eBooks using an existing Calibre database. It is also possible to
  integrate google drive and edit metadata and your calibre library through the app
  itself.
tagline: Web app for browsing, reading and downloading eBooks stored in a Calibre
  database
category: media
developer:
  name: linuxserver
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Calibre-web/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Calibre-web/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Calibre-web/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Calibre-web/screenshot-3.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8083
  host: 8083
  description: Service port 8083
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
- container: /books
  description: Mount for /books
  required: false
env:
- name: DOCKER_MODS
  default: ghcr.io/linuxserver/mods:universal-calibre
  description: DOCKER_MODS environment variable
  advanced: true
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 8083
  path: /
