name: Calibre Web
slug: calibre-web
type: docker
description: Calibre Web application imported from CasaOS catalog
tagline: Calibre Web application imported from CasaOS catalog
category: media
developer:
  name: CasaOS Team
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 8083
    host: 8083
    description: Service port 8083
    protocol: tcp
volumes:
  - container: /config
    description: App configuration
    required: true
  - container: /books
    description: Mount for /books
    required: false
env:
  - name: DOCKER_MODS
    default: ghcr.io/linuxserver/mods:universal-calibre
    description: DOCKER_MODS environment variable
    advanced: true
  - name: PGID
    default: $PGID
    description: PGID environment variable
    advanced: true
  - name: PUID
    default: $PUID
    description: PUID environment variable
    advanced: true
  - name: TZ
    default: $TZ
    description: TZ environment variable
    advanced: true
web_ui:
  port: 8083
  path: /
