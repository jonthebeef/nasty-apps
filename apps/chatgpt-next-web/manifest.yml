name: ChatGPT Next Web
slug: chatgpt-next-web
type: docker
description: An intelligent chat application based on ChatGPT, supports fast deployment,
  Markdown, beautiful UI, fluid response, privacy and security, and allows customization
  of preset roles for quick creation, sharing, and debugging of personalized conversations.
tagline: A well-designed cross-platform ChatGPT UI.
category: tools
developer:
  name: Yidadaa
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/ChatGPT-Next-Web/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/ChatGPT-Next-Web/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/ChatGPT-Next-Web/screenshot-2.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3000
  host: 3000
  description: Service port 3000
  protocol: tcp
volumes: []
env:
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
- name: CODE
  default: ''
  description: CODE environment variable
  advanced: true
- name: PROXY_URL
  default: ''
  description: PROXY_URL environment variable
  advanced: true
- name: BASE_URL
  default: https://api.openai.com
  description: BASE_URL environment variable
  advanced: true
web_ui:
  port: 3000
  path: /
