name: CloudBeaver
slug: cloudbeaver
type: docker
description: CloudBeaver is a web-based database GUI tool which provides rich web
  interface. You can use it to manage PostgreSQL, MySQL, MariaDB, SQL Server, Oracle,
  DB2, Firebird, H2, Trino.
tagline: Cloud Database Manager.
category: tools
developer:
  name: dbeaver
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/CloudBeaver/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/CloudBeaver/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/CloudBeaver/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/CloudBeaver/screenshot-3.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8978
  host: 8978
  description: Service port 8978
  protocol: tcp
volumes:
- container: /opt/cloudbeaver/workspace
  description: Mount for /opt/cloudbeaver/workspace
  required: false
env: []
web_ui:
  port: 8978
  path: /
