name: CloudBeaver
slug: cloudbeaver
type: docker
description: Web-based tool for managing databases with a modern interface
tagline: Cloud database manager
category: tools
developer:
  name: joaobosconff
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8978
  host: 8978
  description: Service port 8978
  protocol: tcp
volumes:
- container: /opt/cloudbeaver/workspace
  description: Mount for /opt/cloudbeaver/workspace
  required: false
env: []
web_ui:
  port: 8978
  path: /
