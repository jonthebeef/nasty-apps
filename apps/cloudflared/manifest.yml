name: Cloudflared
slug: cloudflared
type: docker
description: Expose local services to the internet securely without port forwarding
tagline: Cloudflare Tunnel client
category: tools
developer:
  name: WisdomSky
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 14333
  host: 14333
  description: Service port 14333
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
env: []
web_ui:
  port: 14333
  path: /
