name: ConvertX
slug: convertx
type: docker
description: Convert documents, images, and media between formats
tagline: File conversion service
category: tools
developer:
  name: c4illin
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/ConvertX/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/ConvertX/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/ConvertX/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/ConvertX/screenshot-3.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3000
  host: 3333
  description: Service port 3000
  protocol: tcp
volumes:
- container: /app/data
  description: App data storage
  required: true
env:
- name: JWT_SECRET
  default: aLongAndSecretStringUsedToSignTheJSONWebToken1234
  description: JWT_SECRET environment variable
  advanced: true
- name: HTTP_ALLOWED
  default: 'true'
  description: HTTP_ALLOWED environment variable
  advanced: true
web_ui:
  port: 3333
  path: /
