name: CopyParty
slug: copyparty
type: docker
description: Share files over HTTP with upload, search, and media playback
tagline: Portable file server
category: tools
developer:
  name: CopyParty
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/CopyParty/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/CopyParty/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/CopyParty/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/CopyParty/screenshot-3.png
arch:
- amd64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3923
  host: 29708
  description: Service port 3923
  protocol: tcp
volumes:
- container: /w
  description: Mount for /w
  required: false
- container: /cfg
  description: Mount for /cfg
  required: false
env: []
web_ui:
  port: 29708
  path: /
