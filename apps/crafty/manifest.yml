name: Crafty
slug: crafty
type: docker
description: Crafty is an open source Minecraft control panel built using Tornado
  and AdminLTE, featuring server scheduling, a interactive console and the ability
  to run almost any type of Minecraft server
tagline: Take control of your Minecraft servers.
category: tools
developer:
  name: Crafty Team
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Crafty/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Crafty/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Crafty/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Crafty/screenshot-3.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Crafty/screenshot-4.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Crafty/screenshot-5.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Crafty/screenshot-6.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Crafty/screenshot-7.png
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8443
  host: 8111
  description: Service port 8443
  protocol: tcp
- container: 8123
  host: 8112
  description: Service port 8123
  protocol: tcp
- container: 19132
  host: 19132
  description: Service port 19132
  protocol: udp
volumes:
- container: /crafty/backups
  description: Mount for /crafty/backups
  required: false
- container: /crafty/logs
  description: Mount for /crafty/logs
  required: false
- container: /crafty/servers
  description: Mount for /crafty/servers
  required: false
- container: /crafty/app/config
  description: App configuration
  required: true
- container: /crafty/import
  description: Mount for /crafty/import
  required: false
env:
- name: TZ
  default: Etc/UTC
  description: TZ environment variable
  advanced: true
web_ui:
  port: 8111
  path: /
