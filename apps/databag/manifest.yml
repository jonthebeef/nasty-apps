name: Databag
slug: databag
type: docker
description: Databag is a federated chat app for self-hosting that focuses on user
  privacy and security; the service includes clients for iOS, Android, and browser.
tagline: Messenger for the Decentralized Web
category: tools
developer:
  name: balzack
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Databag/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Databag/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Databag/screenshot-2.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 7000
  host: 7000
  description: Service port 7000
  protocol: tcp
volumes:
- container: /var/lib/databag
  description: App data storage
  required: true
env: []
web_ui:
  port: 7000
  path: /
