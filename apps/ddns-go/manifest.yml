name: Ddns Go
slug: ddns-go
type: docker
description: 'A simple and easy-to-use DDNS tool. Automatically updates domain name
  resolution to your public IP (supports Alibaba Cloud, Tencent Cloud, Dnspod, Cloudflare,
  Callback, Huawei Cloud, Baidu Cloud, Porkbun, GoDaddy, and Google Domain).


  Deploy DDNS-go on Zima, and you can bind the public IP of your Zima device to your
  domain name. This way, you can access your Zima device via the domain name while
  you are away.'
tagline: Simple and easy to use DDNS
category: network-and-dns
developer:
  name: jeessy2
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Ddns-go/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Ddns-go/screenshot-1.png
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 9876
  host: 9876
  description: Service port 9876
  protocol: tcp
volumes:
- container: /root
  description: Mount for /root
  required: false
env: []
web_ui:
  port: 9876
  path: /
