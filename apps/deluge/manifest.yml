name: Deluge
slug: deluge
type: docker
description: Deluge contains the common features to BitTorrent clients such as Protocol
  Encryption, DHT, Local Peer Discovery (LSD), Peer Exchange (PEX), UPnP, NAT-PMP,
  Proxy support, Web seeds, global and per-torrent speed limits. As Deluge heavily
  utilises the ​libtorrent library it has a comprehensive list of the ​features provided.
tagline: A lightweight and free BitTorrent client.
category: tools
developer:
  name: Deluge Team
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Deluge/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Deluge/screenshot-1.jpg
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Deluge/screenshot-2.jpg
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Deluge/screenshot-3.jpg
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Deluge/screenshot-4.jpg
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8112
  host: 8112
  description: Service port 8112
  protocol: tcp
- container: 6881
  host: 6881
  description: Service port 6881
  protocol: tcp
- container: 6881
  host: 6881
  description: Service port 6881
  protocol: udp
volumes:
- container: /config
  description: App configuration
  required: true
- container: /DATA
  description: App data storage
  required: true
env:
- name: DELUGE_LOGLEVEL
  default: error
  description: DELUGE_LOGLEVEL environment variable
  advanced: true
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 8112
  path: /
