name: Downtify
slug: downtify
type: docker
description: With Downtify you can download Spotify musics containing album art, track
  names, album title and other metadata about the songs. Just copy the Spotify link,
  whether it's a single song, an album, etc. As soon as your downloads are complete
  you will be notified!
tagline: Download Spotify music with album art and metadata
category: tools
developer:
  name: Henrique Sebastião
  website: ''
icon: https://raw.githubusercontent.com/henriquesebastiao/downtify/refs/heads/main/assets/casaos-icon.png
screenshots:
- https://raw.githubusercontent.com/henriquesebastiao/downtify/refs/heads/main/assets/screenshot-1.png
- https://raw.githubusercontent.com/henriquesebastiao/downtify/refs/heads/main/assets/screenshot-2.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8000
  host: 8582
  description: Service port 8000
  protocol: tcp
volumes:
- container: /downloads
  description: Mount for /downloads
  required: false
env:
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 8582
  path: /
