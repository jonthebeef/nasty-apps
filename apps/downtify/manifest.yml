name: Downtify
slug: downtify
type: docker
description: Downtify application imported from CasaOS catalog
tagline: Downtify application imported from CasaOS catalog
category: tools
developer:
  name: Henrique Sebastião
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 8000
    host: 8582
    description: Service port 8000
    protocol: tcp
volumes:
  - container: /downloads
    description: Mount for /downloads
    required: false
env:
  - name: PGID
    default: $PGID
    description: PGID environment variable
    advanced: true
  - name: PUID
    default: $PUID
    description: PUID environment variable
    advanced: true
  - name: TZ
    default: $TZ
    description: TZ environment variable
    advanced: true
web_ui:
  port: 8582
  path: /
