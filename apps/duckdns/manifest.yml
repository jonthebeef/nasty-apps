name: DuckDNS
slug: duckdns
type: docker
description: duckdns is a DDNS (Dynamic DNS) application that dynamically binds IP
  addresses to domain names, supporting both IPv4 and IPv6.
tagline: Dynamic DNS for your domain, supporting both IPv4 and IPv6
category: tools
developer:
  name: DuckDNS Team
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/DuckDNS/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/DuckDNS/screenshot-1.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports: []
volumes:
- container: /config
  description: App configuration
  required: true
env:
- name: PUID
  default: '1000'
  description: PUID environment variable
  advanced: true
- name: PGID
  default: '1000'
  description: PGID environment variable
  advanced: true
- name: TZ
  default: Etc/UTC
  description: TZ environment variable
  advanced: true
- name: SUBDOMAINS
  default: subdomain1,subdomain2
  description: SUBDOMAINS environment variable
  advanced: true
- name: TOKEN
  default: token
  description: TOKEN environment variable
  advanced: true
- name: UPDATE_IP
  default: ipv6
  description: UPDATE_IP environment variable
  advanced: true
- name: LOG_FILE
  default: 'false'
  description: LOG_FILE environment variable
  advanced: true
