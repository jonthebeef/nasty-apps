name: Duplicati
slug: duplicati
type: docker
description: Duplicati is a free, open source, backup client that securely stores
  encrypted, incremental, compressed backups on cloud storage services and remote
  file servers.
tagline: Store securely encrypted backups in the cloud!
category: cloud-and-files
developer:
  name: duplicati
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Duplicati/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Duplicati/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Duplicati/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Duplicati/screenshot-3.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8200
  host: 8200
  description: Service port 8200
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
- container: /backups
  description: Mount for /backups
  required: false
- container: /source
  description: Mount for /source
  required: false
env:
- name: PGID
  default: '1000'
  description: PGID environment variable
  advanced: true
- name: PUID
  default: '1000'
  description: PUID environment variable
  advanced: true
- name: TZ
  default: Europe/London
  description: TZ environment variable
  advanced: true
web_ui:
  port: 8200
  path: /
