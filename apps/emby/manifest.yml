name: Emby
slug: emby
type: docker
description: Organise and stream movies, TV, music, and photos
tagline: Media server for your collection
category: media
developer:
  name: Emby Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8096
  host: 8096
  description: Service port 8096
  protocol: tcp
- container: 8920
  host: 8920
  description: Service port 8920
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
- container: /data/tvshows
  description: App data storage
  required: true
- container: /data/movies
  description: App data storage
  required: true
env:
- name: PGID
  default: '1000'
  description: PGID environment variable
  advanced: true
- name: PUID
  default: '1000'
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 8096
  path: /
