name: Embystat
slug: embystat
type: docker
description: EmbyStat is a personal web server that can calculate all kinds of statistics
  from your (local) Emby or Jellyfin server. Just install this on your server and
  let him calculate all kinds of fun stuff. This project is still in Alpha phase,
  but feel free to pull in on your computer and test it out yourself. When the time
  is right I will host a full informational website/release for common platforms and
  Wiki pages.
tagline: Calculate all kinds of statistics from your (local) Emby or Jellyfin server
category: media
developer:
  name: Embystart Team
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Embystat/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Embystat/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Embystat/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Embystat/screenshot-3.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 6555
  host: 6555
  description: Service port 6555
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
env:
- name: PGID
  default: '1000'
  description: PGID environment variable
  advanced: true
- name: PUID
  default: '1000'
  description: PUID environment variable
  advanced: true
- name: TZ
  default: Europe/London
  description: TZ environment variable
  advanced: true
web_ui:
  port: 6555
  path: /
