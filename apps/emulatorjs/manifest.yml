name: EmulatorJS
slug: emulatorjs
type: docker
description: EmulatorJS is a Docker-based emulator application that can simulate various
  operating systems and device environments within containers for development, testing,
  and learning purposes.
tagline: Retro game emulator in the browser
category: tools
developer:
  name: self
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/EmulatorJS/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/EmulatorJS/screenshot-1.jpg
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3000
  host: 3001
  description: Service port 3000
  protocol: tcp
- container: 4001
  host: 4001
  description: Service port 4001
  protocol: tcp
- container: 80
  host: 88
  description: Web interface
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
- container: /data
  description: App data storage
  required: true
- container: /data/nes/roms
  description: App data storage
  required: true
env:
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: SUBFOLDER
  default: /
  description: SUBFOLDER environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 3001
  path: /
