name: ESPHome
slug: esphome
type: docker
description: ESPHome application imported from CasaOS catalog
tagline: ESPHome application imported from CasaOS catalog
category: home-automation
developer:
  name: kd9lsv
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
  - arm
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 6052
    host: 6052
    description: Service port 6052
    protocol: tcp
volumes:
  - container: /config
    description: App configuration
    required: true
env:
  - name: ESPHOME_DASHBOARD_USE_PING
    default: 'false'
    description: ESPHOME_DASHBOARD_USE_PING environment variable
    advanced: true
  - name: TZ
    default: $TZ
    description: TZ environment variable
    advanced: true
web_ui:
  port: 6052
  path: /
