name: Filedrop
slug: filedrop
type: docker
description: FileDrop is a self-hosted file sharing service that allows you to easily
  share files with family, friends, or colleagues. It's been designed to be easy to
  use and light on resources.
tagline: FileDrop is a free, open source file sharing service
category: cloud-and-files
developer:
  name: Noé Favier (noe.favier@outlook.com)
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Filedrop/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Filedrop/screenshot-1.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8000
  host: 8000
  description: Service port 8000
  protocol: tcp
volumes:
- container: /var/file_drop_files
  description: Mount for /var/file_drop_files
  required: false
env:
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 8000
  path: /
