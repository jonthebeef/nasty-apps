name: FileFlows
slug: fileflows
type: docker
description: FileFlows application imported from CasaOS catalog
tagline: FileFlows application imported from CasaOS catalog
category: media
developer:
  name: FileFlows
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 5000
    host: 19200
    description: Service port 5000
    protocol: tcp
volumes:
  - container: /app/Data
    description: App data storage
    required: true
  - container: /app/Logs
    description: Mount for /app/Logs
    required: false
  - container: /app/common
    description: Mount for /app/common
    required: false
  - container: /temp
    description: Mount for /temp
    required: false
  - container: /Media
    description: Media library
    required: true
    hint: Path to your movies, TV shows, and music
  - container: /var/run/docker.sock
    description: Mount for /var/run/docker.sock
    required: false
env:
  - name: PGID
    default: $PGID
    description: PGID environment variable
    advanced: true
  - name: PUID
    default: $PUID
    description: PUID environment variable
    advanced: true
  - name: TZ
    default: $TZ
    description: TZ environment variable
    advanced: true
web_ui:
  port: 19200
  path: /
