name: Firefly
slug: firefly
type: docker
description: Track transactions, budgets, and financial goals
tagline: Personal finance manager
category: tools
developer:
  name: Cp0204
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
- arm
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports: []
volumes:
- container: /lib/modules
  description: Mount for /lib/modules
  required: false
- container: /firefly/conf
  description: Mount for /firefly/conf
  required: false
env:
- name: FIREFLY_PASSWORD
  default: firefly
  description: FIREFLY_PASSWORD environment variable
  advanced: true
