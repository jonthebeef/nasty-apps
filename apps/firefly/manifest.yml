name: Firefly
slug: firefly
type: docker
description: Firefly is a simple and easy to install WireGuard server software, which
  can be widely used in scenarios such as remote networking, remote work, and expose
  a local server behind a NAT or firewall to the internet.  🎯 Features 🟢 Provide a
  simple and easy-to-use web management UI  🟣 Supports access to all WireGuard clients  🟡
  No need for system installation of WireGuard components  🟠 Single file, no additional
  library dependencies  🔴 Automatically apply for free SSL certificate
tagline: Firefly, the easiest using of WireGuard VPN server, plus version of wg-easy.
category: tools
developer:
  name: Safe3
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Firefly/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Firefly/screenshot-1.png
arch:
- amd64
- arm64
- arm
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports: []
volumes:
- container: /lib/modules
  description: Mount for /lib/modules
  required: false
- container: /firefly/conf
  description: Mount for /firefly/conf
  required: false
env:
- name: FIREFLY_PASSWORD
  default: firefly
  description: FIREFLY_PASSWORD environment variable
  advanced: true
