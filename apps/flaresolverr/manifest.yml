name: FlareSolverr
slug: flaresolverr
type: docker
description: FlareSolverr application imported from CasaOS catalog
tagline: FlareSolverr application imported from CasaOS catalog
category: network-and-dns
developer:
  name: calganaygun
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 8191
    host: 8191
    description: Service port 8191
    protocol: tcp
volumes: []
env:
  - name: PGID
    default: $PGID
    description: PGID environment variable
    advanced: true
  - name: PUID
    default: $PUID
    description: PUID environment variable
    advanced: true
  - name: TZ
    default: $TZ
    description: TZ environment variable
    advanced: true
  - name: UMASK
    default: '002'
    description: UMASK environment variable
    advanced: true
  - name: LOG_LEVEL
    default: info
    description: LOG_LEVEL environment variable
    advanced: true
  - name: LOG_HTML
    default: 'false'
    description: LOG_HTML environment variable
    advanced: true
  - name: CAPTCHA_SOLVER
    default: none
    description: CAPTCHA_SOLVER environment variable
    advanced: true
web_ui:
  port: 8191
  path: /
