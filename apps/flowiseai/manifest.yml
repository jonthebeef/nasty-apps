name: FlowiseAi
slug: flowiseai
type: docker
description: Build LLM apps with a drag-and-drop interface
tagline: Visual AI workflow builder
category: tools
developer:
  name: Flowise
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/FlowiseAi/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/FlowiseAi/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/FlowiseAi/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/FlowiseAi/screenshot-3.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/FlowiseAi/screenshot-4.png
arch:
- amd64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3025
  host: 3025
  description: Service port 3025
  protocol: tcp
volumes:
- container: /root/.flowise
  description: Mount for /root/.flowise
  required: false
env:
- name: PORT
  default: '3025'
  description: PORT environment variable
  advanced: true
- name: DATABASE_PATH
  default: /root/.flowise
  description: DATABASE_PATH environment variable
  advanced: true
- name: APIKEY_PATH
  default: /root/.flowise
  description: APIKEY_PATH environment variable
  advanced: true
- name: SECRETKEY_PATH
  default: /root/.flowise
  description: SECRETKEY_PATH environment variable
  advanced: true
- name: LOG_PATH
  default: /root/.flowise/logs
  description: LOG_PATH environment variable
  advanced: true
- name: BLOB_STORAGE_PATH
  default: /root/.flowise/storage
  description: BLOB_STORAGE_PATH environment variable
  advanced: true
- name: FLOWISE_USERNAME
  default: casaos
  description: FLOWISE_USERNAME environment variable
  advanced: true
- name: FLOWISE_PASSWORD
  default: casaos
  description: FLOWISE_PASSWORD environment variable
  advanced: true
web_ui:
  port: 3025
  path: /
