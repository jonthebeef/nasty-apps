name: FreshRSS
slug: freshrss
type: docker
description: FreshRSS is a self-hosted RSS and Atom feed aggregator. It is lightweight,
  easy to work with, powerful, and customizable.
tagline: A free, self-hostable news aggregator…
category: tools
developer:
  name: FreshRSS
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/FreshRSS/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/FreshRSS/screenshot-1.png
arch:
- amd64
- arm64
- arm
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 80
  host: 8749
  description: Web interface
  protocol: tcp
volumes:
- container: /var/www/FreshRSS/data
  description: App data storage
  required: true
- container: /var/www/FreshRSS/extensions
  description: Mount for /var/www/FreshRSS/extensions
  required: false
env:
- name: TZ
  default: ''
  description: TZ environment variable
  advanced: true
- name: CRON_MIN
  default: 1,31
  description: CRON_MIN environment variable
  advanced: true
web_ui:
  port: 8749
  path: /
