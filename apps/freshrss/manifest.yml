name: FreshRSS
slug: freshrss
type: docker
description: Follow your favourite websites and blogs in one place
tagline: Self-hosted RSS reader
category: tools
developer:
  name: FreshRSS
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
- arm
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 80
  host: 8749
  description: Web interface
  protocol: tcp
volumes:
- container: /var/www/FreshRSS/data
  description: App data storage
  required: true
- container: /var/www/FreshRSS/extensions
  description: Mount for /var/www/FreshRSS/extensions
  required: false
env:
- name: TZ
  default: ''
  description: TZ environment variable
  advanced: true
- name: CRON_MIN
  default: 1,31
  description: CRON_MIN environment variable
  advanced: true
web_ui:
  port: 8749
  path: /
