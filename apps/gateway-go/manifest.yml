name: Gateway Go
slug: gateway-go
type: docker
description: 'A fast reverse proxy to help you expose a local server behind a NAT
  or firewall to your client, remote access all your casaos/zimaos apps.


  Use OpenIoTHub to scan the following QR code add a gateway,then add host,add casaos/zimaos
  host''s web page port,finally, enjoy remote control'
tagline: A third-party client for casaos and zimaOS, remote access management interface,
  remote access to installed applications.
category: network-and-dns
developer:
  name: iotserv
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Gateway-go/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Gateway-go/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Gateway-go/screenshot-2.png
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 34323
  host: 34323
  description: Service port 34323
  protocol: tcp
volumes:
- container: /root
  description: Mount for /root
  required: false
env: []
web_ui:
  port: 34323
  path: /
