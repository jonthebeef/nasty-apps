name: Gitea
slug: gitea
type: docker
description: Self-hosted Git service with issues, PRs, and CI
tagline: Lightweight Git hosting
category: tools
developer:
  name: Gitea Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3000
  host: 3002
  description: Service port 3000
  protocol: tcp
- container: 22
  host: 222
  description: SSH access
  protocol: tcp
volumes:
- container: /data
  description: App data storage
  required: true
env:
- name: USER_GID
  default: '1000'
  description: USER_GID environment variable
  advanced: true
- name: USER_UID
  default: '1000'
  description: USER_UID environment variable
  advanced: true
web_ui:
  port: 3002
  path: /
