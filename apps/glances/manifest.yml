name: Glances
slug: glances
type: docker
description: Glances is an open-source system cross-platform monitoring tool. It allows
  real-time monitoring of various aspects of your system such as CPU, memory, disk,
  network usage etc.
tagline: Cross-platform monitoring tool.
category: tools
developer:
  name: Nicolas Hennion
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Glances/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Glances/screenshot-1.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 61208
  host: 61208
  description: Service port 61208
  protocol: tcp
- container: 61209
  host: 61209
  description: Service port 61209
  protocol: tcp
volumes:
- container: /var/run/docker.sock
  description: Mount for /var/run/docker.sock
  required: false
- container: /mnt
  description: Mount for /mnt
  required: false
env:
- name: GLANCES_OPT
  default: -w
  description: GLANCES_OPT environment variable
  advanced: true
web_ui:
  port: 61208
  path: /
