name: Gopeed
slug: gopeed
type: docker
description: Fast downloads with multi-protocol support
tagline: Modern download manager
category: tools
developer:
  name: joaobosconff
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
- arm
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 9999
  host: 9999
  description: Service port 9999
  protocol: tcp
volumes:
- container: /app/storage
  description: Mount for /app/storage
  required: false
- container: /app/Downloads
  description: Mount for /app/Downloads
  required: false
env: []
web_ui:
  port: 9999
  path: /
