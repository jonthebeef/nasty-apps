name: Grafana
slug: grafana
type: docker
description: Grafana application imported from CasaOS catalog
tagline: Grafana application imported from CasaOS catalog
category: network-and-dns
developer:
  name: CasaOS Team
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 3000
    host: 3003
    description: Service port 3000
    protocol: tcp
volumes:
  - container: /var/lib/grafana
    description: Mount for /var/lib/grafana
    required: false
env: []
web_ui:
  port: 3003
  path: /
