name: Handbrake
slug: handbrake
type: docker
description: Handbrake is a Docker-based application for video transcoding and compression,
  offering powerful and flexible multimedia processing across multiple platforms.
tagline: Liberate your videos and unleash infinite possibilities.
category: media
developer:
  name: self
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Handbrake/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Handbrake/screenshot-1.png
arch:
- amd64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 5800
  host: 5800
  description: Service port 5800
  protocol: tcp
volumes:
- container: /storage
  description: Mount for /storage
  required: false
- container: /watch
  description: Mount for /watch
  required: false
- container: /output
  description: Mount for /output
  required: false
- container: /config
  description: App configuration
  required: true
env: []
web_ui:
  port: 5800
  path: /
