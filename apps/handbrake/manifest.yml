name: Handbrake
slug: handbrake
type: docker
description: Handbrake application imported from CasaOS catalog
tagline: Handbrake application imported from CasaOS catalog
category: media
developer:
  name: self
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 5800
    host: 5800
    description: Service port 5800
    protocol: tcp
volumes:
  - container: /storage
    description: Mount for /storage
    required: false
  - container: /watch
    description: Mount for /watch
    required: false
  - container: /output
    description: Mount for /output
    required: false
  - container: /config
    description: App configuration
    required: true
env: []
web_ui:
  port: 5800
  path: /
