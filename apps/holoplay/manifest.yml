name: HoloPlay
slug: holoplay
type: docker
description: Stream your music library with a modern web player
tagline: Music streaming server
category: tools
developer:
  name: Unknown
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- '386'
- arm64
- arm
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3000
  host: 3000
  description: Service port 3000
  protocol: tcp
volumes: []
env: []
web_ui:
  port: 3000
  path: /
