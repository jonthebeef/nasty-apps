name: Home Assistant
slug: homeassistant
type: docker
description: Open-source home automation platform. Control all your smart home devices from a single dashboard with powerful automations.
tagline: Automate your smart home
category: home-automation
developer:
  name: Home Assistant
  website: https://www.home-assistant.io
icon: https://upload.wikimedia.org/wikipedia/commons/6/6e/Home_Assistant_Logo.svg
screenshots: []
arch: [arm64, amd64]
attribution: CasaOS App Store

resources:
  min_ram: 256
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1.0
    performance:
      ram: 1024
      cpu: 2.0

ports:
  - container: 8123
    host: 8123
    description: Web interface
    protocol: tcp

volumes:
  - container: /config
    description: Home Assistant configuration
    required: true

env:
  - name: TZ
    default: "Europe/London"
    description: Timezone
    advanced: true

web_ui:
  port: 8123
  path: /
