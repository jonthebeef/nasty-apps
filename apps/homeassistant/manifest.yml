name: HomeAssistant
slug: homeassistant
type: docker
description: HomeAssistant application imported from CasaOS catalog
tagline: HomeAssistant application imported from CasaOS catalog
category: home-automation
developer:
  name: CasaOS Team
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
  - arm
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports: []
volumes:
  - container: /config
    description: App configuration
    required: true
  - container: /etc/localtime
    description: Mount for /etc/localtime
    required: false
  - container: /run/dbus
    description: Mount for /run/dbus
    required: false
env:
  - name: PGID
    default: $PGID
    description: PGID environment variable
    advanced: true
  - name: PUID
    default: $PUID
    description: PUID environment variable
    advanced: true
  - name: TZ
    default: $TZ
    description: TZ environment variable
    advanced: true
