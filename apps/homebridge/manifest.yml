name: Homebridge
slug: homebridge
type: docker
description: Homebridge is a lightweight NodeJS server you can run on your home network
  that emulates the iOS HomeKit API. It supports Plugins, which are community-contributed
  modules that provide a basic bridge from HomeKit to various 3rd-party APIs provided
  by manufacturers of "smart home" devices.
tagline: HomeKit support for the impatient.
category: home-automation
developer:
  name: Homebridge
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Homebridge/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Homebridge/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Homebridge/screenshot-2.png
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports: []
volumes:
- container: /homebridge
  description: Mount for /homebridge
  required: false
env: []
