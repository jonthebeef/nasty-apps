name: Hugo
slug: hugo
type: docker
description: Build websites from Markdown with instant previews
tagline: Fast static site generator
category: tools
developer:
  name: Hugo Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 1313
  host: 1313
  description: Service port 1313
  protocol: tcp
volumes:
- container: /project
  description: Mount for /project
  required: false
- container: /cache
  description: Mount for /cache
  required: false
env: []
web_ui:
  port: 1313
  path: /
