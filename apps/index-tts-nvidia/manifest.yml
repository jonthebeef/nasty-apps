name: Index TTS Nvidia
slug: index-tts-nvidia
type: docker
description: Fast TTS using Nvidia GPU acceleration
tagline: GPU-accelerated text-to-speech
category: tools
developer:
  name: icewhaletech
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Index-TTS_Nvidia/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Index-TTS_Nvidia/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Index-TTS_Nvidia/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Index-TTS_Nvidia/screenshot-3.png
arch:
- amd64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 7860
  host: 7867
  description: Service port 7860
  protocol: tcp
volumes: []
env:
- name: NVIDIA_VISIBLE_DEVICES
  default: all
  description: NVIDIA_VISIBLE_DEVICES environment variable
  advanced: true
web_ui:
  port: 7867
  path: /
