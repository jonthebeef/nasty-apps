name: Jackett
slug: jackett
type: docker
description: it translates queries from apps (Sonarr, Radarr, SickRage, CouchPotato,
  Mylar3, Lidarr, DuckieTV, qBittorrent, Nefarious etc.) into tracker-site-specific
  http queries, parses the html or json response, and then sends results back to the
  requesting software. This allows for getting recent uploads (like RSS) and performing
  searches. Jackett is a single repository of maintained indexer scraping & translation
  logic - removing the burden from other apps.
tagline: Jackett works as a proxy server
category: network-and-dns
developer:
  name: Jackett
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Jackett/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Jackett/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Jackett/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Jackett/screenshot-3.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 9117
  host: 9117
  description: Service port 9117
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
- container: /downloads
  description: Mount for /downloads
  required: false
env:
- name: AUTO_UPDATE
  default: 'true'
  description: AUTO_UPDATE environment variable
  advanced: true
- name: PGID
  default: '1000'
  description: PGID environment variable
  advanced: true
- name: PUID
  default: '1000'
  description: PUID environment variable
  advanced: true
- name: TZ
  default: Europe/London
  description: TZ environment variable
  advanced: true
web_ui:
  port: 9117
  path: /
