name: Jellyfin Nvidia
slug: jellyfin-nvidia
type: docker
description: 'Imagine having all your movies, TV shows, and music at your fingertips,
  ready on any device. Jellyfin transforms your media collection into a personalized
  entertainment hub, surpassing traditional photo albums. Your media is accessible
  anywhere and beautifully organized.


  Jellyfin is free and open-source, offering high-quality streaming, detailed metadata,
  and personalized recommendations. Multiple users can have their own media libraries.


  Deploying Jellyfin on private cloud devices like Zima provides virtually unlimited
  storage, seamless streaming, and secure, multi-device access. It''s perfect for
  NAS enthusiasts looking to enhance their home media setup.'
tagline: The personal Media System
category: media
developer:
  name: Jellyfin
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Jellyfin/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Jellyfin/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Jellyfin/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Jellyfin/screenshot-3.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8096
  host: 8097
  description: Service port 8096
  protocol: tcp
- container: 8920
  host: 8921
  description: Service port 8920
  protocol: tcp
- container: 7359
  host: 7359
  description: Service port 7359
  protocol: tcp
- container: 1900
  host: 1901
  description: Service port 1900
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
- container: /Media
  description: Media library
  required: true
  hint: Path to your movies, TV shows, and music
- container: /opt/vc/lib
  description: Mount for /opt/vc/lib
  required: false
env:
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
- name: CPU_FALLBACK
  default: 'true'
  description: CPU_FALLBACK environment variable
  advanced: true
- name: NVIDIA_VISIBLE_DEVICES
  default: all
  description: NVIDIA_VISIBLE_DEVICES environment variable
  advanced: true
web_ui:
  port: 8097
  path: /
