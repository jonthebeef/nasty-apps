name: Jellyfin
slug: jellyfin
type: docker
description: Free media streaming server. Stream your movies, TV shows, and music to any device on your network or remotely via Tailscale.
tagline: Stream your media collection to any device
category: media
developer:
  name: Jellyfin Contributors
  website: https://jellyfin.org
icon: https://raw.githubusercontent.com/jellyfin/jellyfin-ux/master/branding/SVG/icon-transparent.svg
screenshots: []
arch: [arm64, amd64]
attribution: CasaOS App Store

resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1.0
    performance:
      ram: 1024
      cpu: 2.0

ports:
  - container: 8096
    host: 8096
    description: Web interface
    protocol: tcp

volumes:
  - container: /config
    description: App configuration
    required: true
  - container: /media
    description: Where are your media files?
    required: true
    hint: Path to your movies, TV shows, and music

env:
  - name: PUID
    default: "1000"
    description: User ID for file permissions
    advanced: true
  - name: PGID
    default: "1000"
    description: Group ID for file permissions
    advanced: true

web_ui:
  port: 8096
  path: /
