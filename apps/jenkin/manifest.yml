name: Jenkin
slug: jenkin
type: docker
description: A server for creating pipelines for Jenkins continuous integration and
  delivery.
tagline: Jenkins Continuous Integration and Delivery server.
category: network-and-dns
developer:
  name: bepp-boop
  website: ''
icon: https://icon.casaos.io/main/all/jenkins.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8080
  host: 8080
  description: Service port 8080
  protocol: tcp
volumes:
- container: /data
  description: App data storage
  required: true
- container: /var/jenkins_home
  description: Mount for /var/jenkins_home
  required: false
env: []
web_ui:
  port: 8080
  path: /
