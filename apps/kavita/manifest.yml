name: Kavita
slug: kavita
type: docker
description: Read manga, comics, and books from your browser
tagline: Digital comic and book reader
category: media
developer:
  name: jvmilazz0
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 5000
  host: 5150
  description: Service port 5000
  protocol: tcp
volumes:
- container: /kavita/config
  description: App configuration
  required: true
- container: /manga
  description: Mount for /manga
  required: false
env:
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 5150
  path: /
