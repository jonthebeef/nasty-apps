name: Komga
slug: komga
type: docker
description: Komga application imported from CasaOS catalog
tagline: Komga application imported from CasaOS catalog
category: media
developer:
  name: gotson
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 25600
    host: 25600
    description: Service port 25600
    protocol: tcp
volumes:
  - container: /config
    description: App configuration
    required: true
  - container: /data
    description: App data storage
    required: true
  - container: /etc/timezone
    description: Mount for /etc/timezone
    required: false
env:
  - name: PGID
    default: '1000'
    description: PGID environment variable
    advanced: true
  - name: PUID
    default: '1000'
    description: PUID environment variable
    advanced: true
web_ui:
  port: 25600
  path: /
