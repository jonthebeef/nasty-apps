name: LabelStudio
slug: labelstudio
type: docker
description: Annotate text, images, and audio for machine learning
tagline: Data labelling platform
category: tools
developer:
  name: CorrectRoadH
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8080
  host: 3080
  description: Service port 8080
  protocol: tcp
volumes:
- container: /label-studio/data
  description: App data storage
  required: true
env:
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 3080
  path: /
