name: LabelStudio
slug: labelstudio
type: docker
description: Label Studio is an open source data labeling tool. It lets you label
  data types like audio, text, images, videos, and time series with a simple and straightforward
  UI and export to various model formats. It can be used to prepare raw data or improve
  existing training data to get more accurate ML models.
tagline: Label Studio is an open source data labeling tool. It lets you label data
  types like audio, text, images, videos, and time series with a simple and straightforward
  UI and export to various model formats. It can be used to prepare raw data or improve
  existing training data to get more accurate ML models.
category: tools
developer:
  name: Yidadaa
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/LabelStudio/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/LabelStudio/screenshot-1.jpg
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8080
  host: 3080
  description: Service port 8080
  protocol: tcp
volumes:
- container: /label-studio/data
  description: App data storage
  required: true
env:
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 3080
  path: /
