name: LangFlow
slug: langflow
type: docker
description: Design AI workflows with a drag-and-drop interface
tagline: Visual LLM chain builder
category: tools
developer:
  name: langflowai
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/LangFlow/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/LangFlow/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/LangFlow/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/LangFlow/screenshot-3.png
arch:
- amd64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 7860
  host: 17860
  description: Service port 7860
  protocol: tcp
volumes:
- container: /app/langflow
  description: Mount for /app/langflow
  required: false
env:
- name: LANGFLOW_DATABASE_URL
  default: postgresql://langflow:langflow@langflow-postgres:5432/langflow
  description: LANGFLOW_DATABASE_URL environment variable
  advanced: true
- name: LANGFLOW_CONFIG_DIR
  default: /app/langflow
  description: LANGFLOW_CONFIG_DIR environment variable
  advanced: true
web_ui:
  port: 17860
  path: /
