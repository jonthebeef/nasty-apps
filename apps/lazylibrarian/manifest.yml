name: Lazylibrarian
slug: lazylibrarian
type: docker
description: Automatically find and download eBooks and audiobooks
tagline: Book download automation
category: tools
developer:
  name: Lazylibrarian Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 5299
  host: 5299
  description: Service port 5299
  protocol: tcp
volumes:
- container: /downloads
  description: Mount for /downloads
  required: false
- container: /books
  description: Mount for /books
  required: false
- container: /config
  description: App configuration
  required: true
env:
- name: DOCKER_MODS
  default: linuxserver/calibre-web:calibre|linuxserver/mods:lazylibrarian-ffmpeg
  description: DOCKER_MODS environment variable
  advanced: true
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 5299
  path: /
