name: LibreChat
slug: librechat
type: docker
description: LibreChat application imported from CasaOS catalog
tagline: LibreChat application imported from CasaOS catalog
category: tools
developer:
  name: LibreChat
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 3080
    host: 3080
    description: Service port 3080
    protocol: tcp
volumes:
  - container: /app/client/public/images
    description: Mount for /app/client/public/images
    required: false
  - container: /app/uploads
    description: Mount for /app/uploads
    required: false
  - container: /app/api/logs
    description: Mount for /app/api/logs
    required: false
env:
  - name: ASSISTANTS_API_KEY
    default: user_provided
    description: ASSISTANTS_API_KEY environment variable
    advanced: true
  - name: OPENAI_API_KEY
    default: user_provided
    description: OPENAI_API_KEY environment variable
    advanced: true
  - name: GOOGLE_KEY
    default: user_provided
    description: GOOGLE_KEY environment variable
    advanced: true
  - name: ANTHROPIC_API_KEY
    default: user_provided
    description: ANTHROPIC_API_KEY environment variable
    advanced: true
  - name: HOST
    default: 0.0.0.0
    description: HOST environment variable
    advanced: true
  - name: PORT
    default: '3080'
    description: PORT environment variable
    advanced: true
  - name: DOMAIN_CLIENT
    default: http://0.0.0.0:3080
    description: DOMAIN_CLIENT environment variable
    advanced: true
  - name: DOMAIN_SERVER
    default: http://0.0.0.0:3080
    description: DOMAIN_SERVER environment variable
    advanced: true
