name: Lidarr
slug: lidarr
type: docker
description: Automatically download and organise your music library
tagline: Music collection manager
category: tools
developer:
  name: Lidarr Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8686
  host: 8686
  description: Service port 8686
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
- container: /music
  description: Mount for /music
  required: false
- container: /downloads
  description: Mount for /downloads
  required: false
env:
- name: PGID
  default: '1000'
  description: PGID environment variable
  advanced: true
- name: PUID
  default: '1000'
  description: PUID environment variable
  advanced: true
- name: TZ
  default: Europe/London
  description: TZ environment variable
  advanced: true
web_ui:
  port: 8686
  path: /
