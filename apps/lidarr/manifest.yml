name: Lidarr
slug: lidarr
type: docker
description: Lidarr is a music collection manager for Usenet and BitTorrent users.
  It can monitor multiple RSS feeds for new albums from your favorite artists and
  will interface with clients and indexers to grab, sort, and rename them. It can
  also be configured to automatically upgrade the quality of existing files in the
  library when a better quality format becomes available.
tagline: Music collection manager for Usenet and BitTorrent users
category: tools
developer:
  name: lidarr Team
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Lidarr/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Lidarr/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Lidarr/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Lidarr/screenshot-3.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8686
  host: 8686
  description: Service port 8686
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
- container: /music
  description: Mount for /music
  required: false
- container: /downloads
  description: Mount for /downloads
  required: false
env:
- name: PGID
  default: '1000'
  description: PGID environment variable
  advanced: true
- name: PUID
  default: '1000'
  description: PUID environment variable
  advanced: true
- name: TZ
  default: Europe/London
  description: TZ environment variable
  advanced: true
web_ui:
  port: 8686
  path: /
