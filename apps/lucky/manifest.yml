name: Lucky
slug: lucky
type: docker
description: A powerful tool for port forwarding, reverse proxy, dynamic DNS, wake-on-LAN,
  IPv4 NAT traversal, webdav services, task scheduling, and automatic certificate
  management.
tagline: Powerful networking tool
category: network-and-dns
developer:
  name: gdy666
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Lucky/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Lucky/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Lucky/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Lucky/screenshot-3.png
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports: []
volumes:
- container: /goodluck
  description: Mount for /goodluck
  required: false
env:
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
