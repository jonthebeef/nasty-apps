name: MariaDB
slug: mariadb
type: docker
description: 'MariaDB Server is one of the most popular open source relational databases.
  It’s made by the original developers of MySQL and guaranteed to stay open source.
  It is part of most cloud offerings and the default in most Linux distributions.


  It is built upon the values of performance, stability, and openness, and MariaDB
  Foundation ensures contributions will be accepted on technical merit. Recent new
  functionality includes advanced clustering with Galera Cluster 4, compatibility
  features with Oracle Database and Temporal Data Tables, allowing one to query the
  data as it stood at any point in the past.'
tagline: MariaDB Server is one of the most popular database servers in the world.
  It's made by the original developers of MySQL and guaranteed to stay open source.
category: tools
developer:
  name: MariaDB Foundation
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/MariaDB/icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3306
  host: 3306
  description: Service port 3306
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
env:
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
- name: MYSQL_ROOT_PASSWORD
  default: casaos
  description: MYSQL_ROOT_PASSWORD environment variable
  advanced: true
- name: MYSQL_DATABASE
  default: casaos
  description: MYSQL_DATABASE environment variable
  advanced: true
- name: MYSQL_USER
  default: casaos
  description: MYSQL_USER environment variable
  advanced: true
- name: MYSQL_PASSWORD
  default: casaos
  description: MYSQL_PASSWORD environment variable
  advanced: true
- name: REMOTE_SQL
  default: ''
  description: REMOTE_SQL environment variable
  advanced: true
web_ui:
  port: 3306
  path: /
