name: MariaDB
slug: mariadb
type: docker
description: Reliable relational database for your applications
tagline: MySQL-compatible database server
category: tools
developer:
  name: WisdomSky
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3306
  host: 3306
  description: Service port 3306
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
env:
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
- name: MYSQL_ROOT_PASSWORD
  default: casaos
  description: MYSQL_ROOT_PASSWORD environment variable
  advanced: true
- name: MYSQL_DATABASE
  default: casaos
  description: MYSQL_DATABASE environment variable
  advanced: true
- name: MYSQL_USER
  default: casaos
  description: MYSQL_USER environment variable
  advanced: true
- name: MYSQL_PASSWORD
  default: casaos
  description: MYSQL_PASSWORD environment variable
  advanced: true
- name: REMOTE_SQL
  default: ''
  description: REMOTE_SQL environment variable
  advanced: true
web_ui:
  port: 3306
  path: /
