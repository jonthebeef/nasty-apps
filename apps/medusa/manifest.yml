name: Medusa
slug: medusa
type: docker
description: Medusa application imported from CasaOS catalog
tagline: Medusa application imported from CasaOS catalog
category: media
developer:
  name: Jason McFeetors
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
  - arm
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 8081
    host: 8081
    description: Service port 8081
    protocol: tcp
volumes:
  - container: /config
    description: App configuration
    required: true
  - container: /downloads
    description: Mount for /downloads
    required: false
  - container: /tv
    description: Mount for /tv
    required: false
env:
  - name: TZ
    default: ' $TZ'
    description: TZ environment variable
    advanced: true
web_ui:
  port: 8081
  path: /
