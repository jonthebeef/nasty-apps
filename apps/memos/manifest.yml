name: Memos
slug: memos
type: docker
description: Memos application imported from CasaOS catalog
tagline: Memos application imported from CasaOS catalog
category: tools
developer:
  name: usememos Team
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
  - arm
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 5230
    host: 5230
    description: Service port 5230
    protocol: tcp
volumes:
  - container: /var/opt/memos
    description: Mount for /var/opt/memos
    required: false
env:
  - name: PGID
    default: $PGID
    description: PGID environment variable
    advanced: true
  - name: PUID
    default: $PUID
    description: PUID environment variable
    advanced: true
  - name: TZ
    default: $TZ
    description: TZ environment variable
    advanced: true
web_ui:
  port: 5230
  path: /
