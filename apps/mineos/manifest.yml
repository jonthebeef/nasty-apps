name: MineOS
slug: mineos
type: docker
description: MineOS is a server front-end to ease managing Minecraft administrative
  tasks. This iteration using Node.js aims to enhance previous MineOS scripts (Python-based),
  by leveraging the event-triggering, asyncronous model of Node.JS and websockets.
tagline: Free and easy to use Minecraft server management tool.
category: tools
developer:
  name: hexparrot
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/MineOS/icon.png
screenshots: []
arch:
- amd64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8443
  host: 8444
  description: Service port 8443
  protocol: tcp
volumes:
- container: /var/games/minecraft
  description: Mount for /var/games/minecraft
  required: false
env:
- name: USE_HTTPS
  default: 'true'
  description: USE_HTTPS environment variable
  advanced: true
- name: SERVER_PORT
  default: '8443'
  description: SERVER_PORT environment variable
  advanced: true
- name: USER_NAME
  default: mc
  description: USER_NAME environment variable
  advanced: true
- name: USER_UID
  default: '1000'
  description: USER_UID environment variable
  advanced: true
- name: USER_PASSWORD
  default: root
  description: USER_PASSWORD environment variable
  advanced: true
web_ui:
  port: 8444
  path: /
