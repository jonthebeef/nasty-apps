name: MineOS
slug: mineos
type: docker
description: MineOS application imported from CasaOS catalog
tagline: MineOS application imported from CasaOS catalog
category: tools
developer:
  name: Chàra Rose
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 8443
    host: 8444
    description: Service port 8443
    protocol: tcp
volumes:
  - container: /var/games/minecraft
    description: Mount for /var/games/minecraft
    required: false
env:
  - name: USE_HTTPS
    default: 'true'
    description: USE_HTTPS environment variable
    advanced: true
  - name: SERVER_PORT
    default: '8443'
    description: SERVER_PORT environment variable
    advanced: true
  - name: USER_NAME
    default: mc
    description: USER_NAME environment variable
    advanced: true
  - name: USER_UID
    default: '1000'
    description: USER_UID environment variable
    advanced: true
  - name: USER_PASSWORD
    default: root
    description: USER_PASSWORD environment variable
    advanced: true
web_ui:
  port: 8444
  path: /
