name: MongoDB4
slug: mongodb4
type: docker
description: Stable release of the MongoDB document database
tagline: MongoDB 4.x database server
category: tools
developer:
  name: WisdomSky
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 27017
  host: 27017
  description: Service port 27017
  protocol: tcp
volumes:
- container: /data/configdb
  description: App configuration
  required: true
- container: /data/db
  description: App data storage
  required: true
env:
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 27017
  path: /
