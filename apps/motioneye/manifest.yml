name: Motioneye
slug: motioneye
type: docker
description: Motioneye application imported from CasaOS catalog
tagline: Motioneye application imported from CasaOS catalog
category: tools
developer:
  name: f4bio
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
attribution: CasaOS App Store
