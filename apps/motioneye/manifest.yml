name: Motioneye
slug: motioneye
type: docker
description: motionEye is a web-based frontend for motion. Check out the wiki for
  more details. Changelog is available on the releases page. https://github.com/motioneye-project/motioneye
tagline: A web frontend for the motion daemon.
category: tools
developer:
  name: Motioneye
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Motioneye/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Motioneye/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Motioneye/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Motioneye/screenshot-3.png
arch:
- amd64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8765
  host: 8765
  description: Service port 8765
  protocol: tcp
volumes:
- container: /etc/motioneye
  description: Mount for /etc/motioneye
  required: false
- container: /var/lib/motioneye
  description: Mount for /var/lib/motioneye
  required: false
env: []
web_ui:
  port: 8765
  path: /
