name: Mylar3
slug: mylar3
type: docker
description: Mylar is an automated Comic Book (cbr/cbz) downloader program for use
  with NZB and torrents. Mylar allows you to create a watchlist of series that it
  monitors for various things (new issues, updated information, etc). It will grab,
  sort, and rename downloaded issues. It will also allow you to monitor weekly pull-lists
  for items belonging to said watchlisted series to download, as well as being able
  to monitor and maintain story-arcs.
tagline: Automatic comic book (cbr/cbz) downloader
category: tools
developer:
  name: Mylar3 Team
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Mylar3/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Mylar3/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Mylar3/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Mylar3/screenshot-3.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Mylar3/screenshot-4.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8090
  host: 8090
  description: Service port 8090
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
- container: /comics
  description: Mount for /comics
  required: false
- container: /downloads
  description: Mount for /downloads
  required: false
env:
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 8090
  path: /
