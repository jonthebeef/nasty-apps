name: MySpeed
slug: myspeed
type: docker
description: MySpeed application imported from CasaOS catalog
tagline: MySpeed application imported from CasaOS catalog
category: tools
developer:
  name: joaobosconff
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
  - arm
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 5216
    host: 5216
    description: Service port 5216
    protocol: tcp
volumes:
  - container: /myspeed/data
    description: App data storage
    required: true
env: []
web_ui:
  port: 5216
  path: /
