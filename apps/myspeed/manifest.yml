name: MySpeed
slug: myspeed
type: docker
description: Monitor your internet speed over time with charts
tagline: Internet speed test tracker
category: tools
developer:
  name: joaobosconff
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
- arm
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 5216
  host: 5216
  description: Service port 5216
  protocol: tcp
volumes:
- container: /myspeed/data
  description: App data storage
  required: true
env: []
web_ui:
  port: 5216
  path: /
