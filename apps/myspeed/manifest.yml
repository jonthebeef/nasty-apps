name: MySpeed
slug: myspeed
type: docker
description: MySpeed is a speed test analysis software that stores the speed of your
  internet for up to 30 days. This can also be useful if you want to know when your
  network might have drops or if you want to check if your internet matches the booked
  values from your contract.
tagline: Analysis software that shows your internet speed for up to 30 days.
category: tools
developer:
  name: Mathias Wagner
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/MySpeed/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/MySpeed/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/MySpeed/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/MySpeed/screenshot-3.png
arch:
- amd64
- arm64
- arm
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 5216
  host: 5216
  description: Service port 5216
  protocol: tcp
volumes:
- container: /myspeed/data
  description: App data storage
  required: true
env: []
web_ui:
  port: 5216
  path: /
