name: N8n
slug: n8n
type: docker
description: Connect apps and automate tasks with visual workflows
tagline: Workflow automation platform
category: tools
developer:
  name: n8n
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/N8n/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/N8n/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/N8n/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/N8n/screenshot-3.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 5678
  host: 5678
  description: Service port 5678
  protocol: tcp
volumes:
- container: /home/node/.n8n
  description: Mount for /home/node/.n8n
  required: false
env:
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
- name: N8N_SECURE_COOKIE
  default: 'false'
  description: N8N_SECURE_COOKIE environment variable
  advanced: true
web_ui:
  port: 5678
  path: /
