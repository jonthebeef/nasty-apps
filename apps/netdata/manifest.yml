name: Netdata
slug: netdata
type: docker
description: Netdata is a real-time performance and health monitoring solution that
  helps you visualize and understand the behavior of your systems.
tagline: Real-time Performance Monitoring
category: tools
developer:
  name: f4bio
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Netdata/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Netdata/screenshot-1.jpg
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Netdata/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Netdata/screenshot-3.png
arch:
- amd64
- arm64
- arm
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 19999
  host: 19999
  description: Service port 19999
  protocol: tcp
volumes:
- container: /etc/netdata
  description: App data storage
  required: true
- container: /var/lib/netdata
  description: App data storage
  required: true
- container: /var/cache/netdata
  description: App data storage
  required: true
- container: /host/etc/passwd
  description: Mount for /host/etc/passwd
  required: false
- container: /host/etc/group
  description: Mount for /host/etc/group
  required: false
- container: /host/proc
  description: Mount for /host/proc
  required: false
- container: /host/sys
  description: Mount for /host/sys
  required: false
- container: /host/etc/os-release
  description: Mount for /host/etc/os-release
  required: false
- container: /var/run/docker.sock
  description: Mount for /var/run/docker.sock
  required: false
env: []
web_ui:
  port: 19999
  path: /
