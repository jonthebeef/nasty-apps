name: Nextcloud
slug: nextcloud
type: docker
description: Nextcloud application imported from CasaOS catalog
tagline: Nextcloud application imported from CasaOS catalog
category: cloud-and-files
developer:
  name: CasaOS Team
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm
  - arm64
  - '386'
  - mips64le
  - ppc64le
  - s390x
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 80
    host: 10081
    description: Web interface
    protocol: tcp
  - container: 443
    host: 10443
    description: Web interface
    protocol: tcp
volumes:
  - container: /var/www/html
    description: Mount for /var/www/html
    required: false
env: []
web_ui:
  port: 10081
  path: /
