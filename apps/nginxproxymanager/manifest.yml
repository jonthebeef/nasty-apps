name: NginxProxyManager
slug: nginxproxymanager
type: docker
description: Manage Nginx proxy hosts and Let's Encrypt certificates
tagline: Reverse proxy with SSL
category: network-and-dns
developer:
  name: NginxProxyManager Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
- arm
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 80
  host: 80
  description: Web interface
  protocol: tcp
- container: 443
  host: 443
  description: Web interface
  protocol: tcp
- container: 81
  host: 81
  description: Service port 81
  protocol: tcp
volumes:
- container: /data
  description: App data storage
  required: true
- container: /etc/letsencrypt
  description: Mount for /etc/letsencrypt
  required: false
env: []
web_ui:
  port: 80
  path: /
