name: NginxProxyManager
slug: nginxproxymanager
type: docker
description: NginxProxyManager application imported from CasaOS catalog
tagline: NginxProxyManager application imported from CasaOS catalog
category: network-and-dns
developer:
  name: CasaOS Team
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
  - arm
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 80
    host: 80
    description: Web interface
    protocol: tcp
  - container: 443
    host: 443
    description: Web interface
    protocol: tcp
  - container: 81
    host: 81
    description: Service port 81
    protocol: tcp
volumes:
  - container: /data
    description: App data storage
    required: true
  - container: /etc/letsencrypt
    description: Mount for /etc/letsencrypt
    required: false
env: []
web_ui:
  port: 80
  path: /
