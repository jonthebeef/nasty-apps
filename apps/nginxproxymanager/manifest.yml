name: NginxProxyManager
slug: nginxproxymanager
type: docker
description: Nginx Proxy Manager is a simple, powerful tool to help you host multiple
  websites on a single server.
tagline: Managing Nginx proxy hosts with a simple, powerful interface.
category: network-and-dns
developer:
  name: Nginx Proxy Manager
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/NginxProxyManager/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/NginxProxyManager/screenshot-1.jpg
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/NginxProxyManager/screenshot-2.jpg
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/NginxProxyManager/screenshot-3.jpg
arch:
- amd64
- arm64
- arm
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 80
  host: 80
  description: Web interface
  protocol: tcp
- container: 443
  host: 443
  description: Web interface
  protocol: tcp
- container: 81
  host: 81
  description: Service port 81
  protocol: tcp
volumes:
- container: /data
  description: App data storage
  required: true
- container: /etc/letsencrypt
  description: Mount for /etc/letsencrypt
  required: false
env: []
web_ui:
  port: 80
  path: /
