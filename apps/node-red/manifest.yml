name: Node RED
slug: node-red
type: docker
description: Wire together devices, APIs, and services with a flow editor
tagline: Visual programming for IoT
category: tools
developer:
  name: Node-RED
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Node-RED/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Node-RED/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Node-RED/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Node-RED/screenshot-3.png
arch:
- amd64
- arm64
- s390x
- arm
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 1880
  host: 1880
  description: Service port 1880
  protocol: tcp
volumes:
- container: /data
  description: App data storage
  required: true
env: []
web_ui:
  port: 1880
  path: /
