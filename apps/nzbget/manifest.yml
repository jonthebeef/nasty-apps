name: Nzbget
slug: nzbget
type: docker
description: Nzbget application imported from CasaOS catalog
tagline: Nzbget application imported from CasaOS catalog
category: tools
developer:
  name: CasaOS Team
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 6789
    host: 6789
    description: Service port 6789
    protocol: tcp
volumes:
  - container: /config
    description: App configuration
    required: true
  - container: /downloads
    description: Mount for /downloads
    required: false
env:
  - name: NZBGET_PASS
    default: tegbzn6789
    description: NZBGET_PASS environment variable
    advanced: true
  - name: NZBGET_USER
    default: nzbget
    description: NZBGET_USER environment variable
    advanced: true
  - name: PGID
    default: '1000'
    description: PGID environment variable
    advanced: true
  - name: PUID
    default: '1000'
    description: PUID environment variable
    advanced: true
  - name: TZ
    default: Europe/London
    description: TZ environment variable
    advanced: true
web_ui:
  port: 6789
  path: /
