name: Obsidian
slug: obsidian
type: docker
description: Web-based access to your Obsidian vault
tagline: Knowledge base and note-taking
category: tools
developer:
  name: Obsidian Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3000
  host: 15323
  description: Service port 3000
  protocol: tcp
- container: 3001
  host: 15324
  description: Service port 3001
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
env:
- name: PUID
  default: '1000'
  description: PUID environment variable
  advanced: true
- name: PGID
  default: '1000'
  description: PGID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 15323
  path: /
