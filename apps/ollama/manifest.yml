name: Ollama
slug: ollama
type: docker
description: Download and run large language models on your own hardware
tagline: Run LLMs locally
category: tools
developer:
  name: ollama
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 11434
  host: 11434
  description: Service port 11434
  protocol: tcp
volumes:
- container: /root/.ollama
  description: Mount for /root/.ollama
  required: false
env: []
web_ui:
  port: 11434
  path: /
