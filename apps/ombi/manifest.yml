name: Ombi
slug: ombi
type: docker
description: Ombi is a self-hosted web application that automatically gives your shared
  Plex or Emby users the ability to request content by themselves! Ombi can be linked
  to multiple TV Show and Movie DVR tools to create a seamless end-to-end experience
  for your users.
tagline: Friendly media request tool, automatically syncs with your media servers!
category: media
developer:
  name: Sabnzbd Team
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Ombi/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Ombi/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Ombi/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Ombi/screenshot-3.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3579
  host: 3579
  description: Service port 3579
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
env:
- name: BASE_URL
  default: /ombi
  description: BASE_URL environment variable
  advanced: true
- name: PGID
  default: '1000'
  description: PGID environment variable
  advanced: true
- name: PUID
  default: '1000'
  description: PUID environment variable
  advanced: true
- name: TZ
  default: Europe/London
  description: TZ environment variable
  advanced: true
web_ui:
  port: 3579
  path: /
