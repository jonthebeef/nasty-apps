name: OpenClaw
slug: openclaw
type: docker
description: Extract and analyse data from legal documents
tagline: Document analysis tool
category: tools
developer:
  name: openclaw
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 18789
  host: 24190
  description: Service port 18789
  protocol: tcp
- container: 18790
  host: 18790
  description: Service port 18790
  protocol: tcp
volumes:
- container: /home/node/.openclaw
  description: Mount for /home/node/.openclaw
  required: false
env:
- name: HOME
  default: /home/node
  description: HOME environment variable
  advanced: true
- name: TERM
  default: xterm-256color
  description: TERM environment variable
  advanced: true
- name: OPENCLAW_GATEWAY_TOKEN
  default: casaos
  description: OPENCLAW_GATEWAY_TOKEN environment variable
  advanced: true
web_ui:
  port: 24190
  path: /
