name: OpenHAB
slug: openhab
type: docker
description: The open Home Automation Bus (openHAB, pronounced ˈəʊpənˈhæb) is an open
  source, technology agnostic home automation platform which runs as the center of
  your smart home! Its ability to integrate a multitude of other devices and systems.
  openHAB includes other home automation systems, (smart) devices and other technologies
  into a single solution. To provide a uniform user interface and a common approach
  to automation rules across the entire system, regardless of the number of manufacturers
  and sub-systems involved. Giving you the most flexible tool available to make almost
  any home automation wish come true; if you can think it, odds are that you can implement
  it with openHAB.
tagline: Empowering the smart home
category: home-automation
developer:
  name: openHAB
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/OpenHAB/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/OpenHAB/screenshot-1.jpg
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/OpenHAB/screenshot-2.jpg
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/OpenHAB/screenshot-3.jpg
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/OpenHAB/screenshot-4.jpg
arch:
- amd64
- arm64
- arm
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports: []
volumes:
- container: /etc/localtime
  description: Mount for /etc/localtime
  required: false
- container: /etc/timezone
  description: Mount for /etc/timezone
  required: false
- container: /openhab/addons
  description: Mount for /openhab/addons
  required: false
- container: /openhab/conf
  description: Mount for /openhab/conf
  required: false
- container: /openhab/userdata
  description: App data storage
  required: true
env:
- name: CRYPTO_POLICY
  default: unlimited
  description: CRYPTO_POLICY environment variable
  advanced: true
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
