  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3000
  host: 3004
  description: Service port 3000
  protocol: tcp
volumes: []
env: []
web_ui:
  port: 3004
  path: /
