name: OpenSpeedTest
slug: openspeedtest
type: docker
description: An application for launching HTML5 Network Speed Test Server. You can
  test download & upload speed from any device within your network with a web browser
  that is IE10 or new.
tagline: HTML5 Network Speed Test Server.
category: tools
developer:
  name: OpenSpeedTest
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/OpenSpeedTest/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/OpenSpeedTest/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/OpenSpeedTest/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/OpenSpeedTest/screenshot-3.png
arch:
- amd64
- arm64
- ppc64le
- s390x
- '386'
- arm
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3000
  host: 3004
  description: Service port 3000
  protocol: tcp
volumes: []
env: []
web_ui:
  port: 3004
  path: /
