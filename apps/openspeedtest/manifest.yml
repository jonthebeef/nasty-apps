name: OpenSpeedTest
slug: openspeedtest
type: docker
description: Test your local network speed from any browser
tagline: Network speed test server
category: tools
developer:
  name: OpenSpeedTest
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
- ppc64le
- s390x
- '386'
- arm
resources:
