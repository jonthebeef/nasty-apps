name: OpenWebUI
slug: openwebui
type: docker
description: OpenWebUI application imported from CasaOS catalog
tagline: OpenWebUI application imported from CasaOS catalog
category: tools
developer:
  name: Unknown
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 8080
    host: 3050
    description: Service port 8080
    protocol: tcp
volumes:
  - container: /app/backend/data
    description: App data storage
    required: true
  - container: /root/.ollama
    description: Mount for /root/.ollama
    required: false
env:
  - name: CPU_FALLBACK
    default: 'true'
    description: CPU_FALLBACK environment variable
    advanced: true
  - name: NVIDIA_VISIBLE_DEVICES
    default: all
    description: NVIDIA_VISIBLE_DEVICES environment variable
    advanced: true
web_ui:
  port: 3050
  path: /
