name: OpenWebUI
slug: openwebui
type: docker
description: Chat with local LLMs through a polished web UI
tagline: Web interface for Ollama
category: tools
developer:
  name: Tim J. Baek
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/OpenWebUI/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/OpenWebUI/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/OpenWebUI/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/OpenWebUI/screenshot-3.png
arch:
- amd64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8080
  host: 3050
  description: Service port 8080
  protocol: tcp
volumes:
- container: /app/backend/data
  description: App data storage
  required: true
- container: /root/.ollama
  description: Mount for /root/.ollama
  required: false
env:
- name: CPU_FALLBACK
  default: 'true'
  description: CPU_FALLBACK environment variable
  advanced: true
- name: NVIDIA_VISIBLE_DEVICES
  default: all
  description: NVIDIA_VISIBLE_DEVICES environment variable
  advanced: true
web_ui:
  port: 3050
  path: /
