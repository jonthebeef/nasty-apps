name: OPodSync
slug: opodsync
type: docker
description: Sync podcast subscriptions and progress across devices
tagline: Podcast sync server
category: tools
developer:
  name: ganeshlab
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/oPodSync/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/oPodSync/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/oPodSync/screenshot-2.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8080
  host: 8086
  description: Service port 8080
  protocol: tcp
volumes:
- container: /var/www/server/data
  description: App data storage
  required: true
env: []
web_ui:
  port: 8086
  path: /
