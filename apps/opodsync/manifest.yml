name: OPodSync
slug: opodsync
type: docker
description: OPodSync application imported from CasaOS catalog
tagline: OPodSync application imported from CasaOS catalog
category: tools
developer:
  name: ganeshlab
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 8080
    host: 8086
    description: Service port 8080
    protocol: tcp
volumes:
  - container: /var/www/server/data
    description: App data storage
    required: true
env: []
web_ui:
  port: 8086
  path: /
