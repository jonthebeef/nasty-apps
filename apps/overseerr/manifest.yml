name: Overseerr
slug: overseerr
type: docker
description: Overseerr application imported from CasaOS catalog
tagline: Overseerr application imported from CasaOS catalog
category: media
developer:
  name: WisdomSky
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 5055
    host: 5055
    description: Service port 5055
    protocol: tcp
volumes:
  - container: /config
    description: App configuration
    required: true
env:
  - name: PUID
    default: $PUID
    description: PUID environment variable
    advanced: true
  - name: PGID
    default: $PGID
    description: PGID environment variable
    advanced: true
  - name: TZ
    default: $TZ
    description: TZ environment variable
    advanced: true
web_ui:
  port: 5055
  path: /
