name: PdfDing
slug: pdfding
type: docker
description: PdfDing application imported from CasaOS catalog
tagline: PdfDing application imported from CasaOS catalog
category: tools
developer:
  name: mrmn2
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 8000
    host: 8000
    description: Service port 8000
    protocol: tcp
volumes:
  - container: /home/nonroot/pdfding/db
    description: Mount for /home/nonroot/pdfding/db
    required: false
  - container: /home/nonroot/pdfding/media
    description: Media library
    required: true
    hint: Path to your movies, TV shows, and music
env:
  - name: HOST_NAME
    default: '*'
    description: HOST_NAME environment variable
    advanced: true
  - name: SECRET_KEY
    default: your_secret_key_here
    description: SECRET_KEY environment variable
    advanced: true
  - name: CSRF_COOKIE_SECURE
    default: 'FALSE'
    description: CSRF_COOKIE_SECURE environment variable
    advanced: true
  - name: SESSION_COOKIE_SECURE
    default: 'FALSE'
    description: SESSION_COOKIE_SECURE environment variable
    advanced: true
  - name: DEBUG
    default: 'FALSE'
    description: DEBUG environment variable
    advanced: true
web_ui:
  port: 8000
  path: /
