name: Peanut
slug: peanut
type: docker
description: Monitor and manage UPS devices on your network
tagline: Network UPS monitoring
category: tools
developer:
  name: brandawg93
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Peanut/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Peanut/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Peanut/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Peanut/screenshot-3.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8080
  host: 8084
  description: Service port 8080
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
env:
- name: WEB_PORT
  default: '8080'
  description: WEB_PORT environment variable
  advanced: true
web_ui:
  port: 8084
  path: /
