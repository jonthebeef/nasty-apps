name: Peanut
slug: peanut
type: docker
description: Peanut application imported from CasaOS catalog
tagline: Peanut application imported from CasaOS catalog
category: tools
developer:
  name: brandawg93
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 8080
    host: 8084
    description: Service port 8080
    protocol: tcp
volumes:
  - container: /config
    description: App configuration
    required: true
env:
  - name: WEB_PORT
    default: '8080'
    description: WEB_PORT environment variable
    advanced: true
web_ui:
  port: 8084
  path: /
