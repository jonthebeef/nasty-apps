name: Petio
slug: petio
type: docker
description: 'Petio is a third party companion app available to Plex server owners
  to allow their users to request, review and discover content. The app is built to
  appear instantly familiar and intuitive to even the most tech-agnostic users. Petio
  will help you manage requests from your users, connect to other third party apps
  such as Sonarr and Radarr, notify users when content is available and track request
  progress. Petio also allows users to discover media both on and off your server,
  quickly and easily find related content and review to leave their opinion for other
  users.


  Petio is an ongoing, forever free, always evolving project currently in alpha prototype
  stage and now available!'
tagline: A third party companion app available to Plex server owners to allow their
  users to request, review and discover content.
category: media
developer:
  name: Petio Team
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Petio/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Petio/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Petio/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Petio/screenshot-3.png
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 7777
  host: 7777
  description: Service port 7777
  protocol: tcp
volumes:
- container: /app/api/config
  description: App configuration
  required: true
- container: /app/logs
  description: Mount for /app/logs
  required: false
env:
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 7777
  path: /
