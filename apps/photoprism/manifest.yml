name: PhotoPrism
slug: photoprism
type: docker
description: Browse, organise, and share your photo collection
tagline: AI-powered photo management
category: tools
developer:
  name: PhotoPrism Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 2342
  host: 2342
  description: Service port 2342
  protocol: tcp
volumes:
- container: /photoprism/storage
  description: Mount for /photoprism/storage
  required: false
- container: /photoprism/originals
  description: Mount for /photoprism/originals
  required: false
env:
- name: PHOTOPRISM_ADMIN_PASSWORD
  default: casaos
  description: PHOTOPRISM_ADMIN_PASSWORD environment variable
  advanced: true
- name: PHOTOPRISM_UPLOAD_NSFW
  default: 'true'
  description: PHOTOPRISM_UPLOAD_NSFW environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 2342
  path: /
