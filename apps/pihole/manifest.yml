name: Pi-hole
slug: pihole
type: docker
description: Network-wide ad blocking. Pi-hole acts as a DNS sinkhole that protects your devices from unwanted content without installing client-side software.
tagline: Network-wide ad blocking
category: network
developer:
  name: Pi-hole
  website: https://pi-hole.net
icon: https://wp-cdn.pi-hole.net/wp-content/uploads/2016/12/Vortex-R.png
screenshots: []
arch: [arm64, amd64]
attribution: CasaOS App Store

resources:
  min_ram: 128
  profiles:
    light:
      ram: 128
      cpu: 0.25
    standard:
      ram: 256
      cpu: 0.5
    performance:
      ram: 512
      cpu: 1.0

ports:
  - container: 80
    host: 8080
    description: Web admin interface
    protocol: tcp
  - container: 53
    host: 53
    description: DNS
    protocol: udp

volumes:
  - container: /etc/pihole
    description: Pi-hole configuration
    required: true
  - container: /etc/dnsmasq.d
    description: DNS configuration
    required: true

env:
  - name: WEBPASSWORD
    default: ""
    description: Admin panel password
    advanced: false

web_ui:
  port: 8080
  path: /admin
