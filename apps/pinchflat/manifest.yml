name: Pinchflat
slug: pinchflat
type: docker
description: Download and archive YouTube channels and playlists
tagline: YouTube archiver
category: media
developer:
  name: kieraneglin
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Pinchflat/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Pinchflat/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Pinchflat/screenshot-2.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8945
  host: 8945
  description: Service port 8945
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
- container: /downloads
  description: Mount for /downloads
  required: false
env:
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
web_ui:
  port: 8945
  path: /
