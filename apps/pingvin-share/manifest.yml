name: Pingvin Share
slug: pingvin-share
type: docker
description: Pingvin Share application imported from CasaOS catalog
tagline: Pingvin Share application imported from CasaOS catalog
category: tools
developer:
  name: stonith404
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 3000
    host: 3410
    description: Service port 3000
    protocol: tcp
volumes:
  - container: /opt/app/backend/data
    description: App data storage
    required: true
  - container: /opt/app/frontend/public/img
    description: Mount for /opt/app/frontend/public/img
    required: false
env:
  - name: TRUST_PROXY
    default: 'false'
    description: TRUST_PROXY environment variable
    advanced: true
web_ui:
  port: 3410
  path: /
