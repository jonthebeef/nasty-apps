name: Pingvin Share
slug: pingvin-share
type: docker
description: Share files with expiring links and password protection
tagline: Self-hosted file sharing
category: tools
developer:
  name: stonith404
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Pingvin-Share/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Pingvin-Share/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Pingvin-Share/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Pingvin-Share/screenshot-3.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3000
  host: 3410
  description: Service port 3000
  protocol: tcp
volumes:
- container: /opt/app/backend/data
  description: App data storage
  required: true
- container: /opt/app/frontend/public/img
  description: Mount for /opt/app/frontend/public/img
  required: false
env:
- name: TRUST_PROXY
  default: 'false'
  description: TRUST_PROXY environment variable
  advanced: true
web_ui:
  port: 3410
  path: /
