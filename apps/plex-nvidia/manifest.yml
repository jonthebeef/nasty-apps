name: Plex Nvidia
slug: plex-nvidia
type: docker
description: Hardware-accelerated media streaming with Plex
tagline: Plex with Nvidia GPU transcoding
category: media
developer:
  name: Plex Nvidia Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports: []
volumes:
- container: /config
  description: App configuration
  required: true
- container: /Media
  description: Media library
  required: true
  hint: Path to your movies, TV shows, and music
env:
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: VERSION
  default: docker
  description: VERSION environment variable
  advanced: true
- name: CPU_FALLBACK
  default: 'true'
  description: CPU_FALLBACK environment variable
  advanced: true
- name: NVIDIA_VISIBLE_DEVICES
  default: all
  description: NVIDIA_VISIBLE_DEVICES environment variable
  advanced: true
