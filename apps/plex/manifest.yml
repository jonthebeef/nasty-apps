name: Plex
slug: plex
type: docker
description: Organise and stream your media collection beautifully
tagline: Premium media streaming server
category: media
developer:
  name: Plex Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports: []
volumes:
- container: /config
  description: App configuration
  required: true
- container: /Media
  description: Media library
  required: true
  hint: Path to your movies, TV shows, and music
env:
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: VERSION
  default: docker
  description: VERSION environment variable
  advanced: true
