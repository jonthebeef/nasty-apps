name: Plex
slug: plex
type: docker
description: Organise and stream your personal media collection. Movies, TV shows, music, photos — beautifully presented and available on every device.
tagline: Organise and stream your media
category: media
developer:
  name: Plex Inc.
  website: https://plex.tv
icon: https://www.plex.tv/wp-content/themes/flavor/assets/img/plex-logo.svg
screenshots: []
arch: [arm64, amd64]

resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1.0
    performance:
      ram: 2048
      cpu: 4.0

ports:
  - container: 32400
    host: 32400
    description: Plex Media Server
    protocol: tcp

volumes:
  - container: /config
    description: Plex configuration and metadata
    required: true
  - container: /media
    description: Where are your media files?
    required: true
    hint: Path to your movies, TV shows, and music

env:
  - name: PLEX_CLAIM
    default: ""
    description: Claim token from plex.tv/claim
    advanced: false
  - name: PUID
    default: "1000"
    description: User ID for file permissions
    advanced: true
  - name: PGID
    default: "1000"
    description: Group ID for file permissions
    advanced: true

web_ui:
  port: 32400
  path: /web
