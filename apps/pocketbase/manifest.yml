name: PocketBase
slug: pocketbase
type: docker
description: SQLite database with REST API, auth, and file storage
tagline: Backend in a single binary
category: tools
developer:
  name: PocketBase Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8090
  host: 8090
  description: Service port 8090
  protocol: tcp
volumes:
- container: /pb_data
  description: App data storage
  required: true
env: []
web_ui:
  port: 8090
  path: /
