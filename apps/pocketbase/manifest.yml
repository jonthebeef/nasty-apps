name: PocketBase
slug: pocketbase
type: docker
description: PocketBase is an open-source backend solution that combines a real-time
  database, authentication, file storage, and an admin dashboard into a single, portable
  executable.
tagline: Open Source realtime backend in 1 file
category: tools
developer:
  name: Gani Georgiev
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/PocketBase/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/PocketBase/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/PocketBase/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/PocketBase/screenshot-3.png
arch:
- amd64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8090
  host: 8090
  description: Service port 8090
  protocol: tcp
volumes:
- container: /pb_data
  description: App data storage
  required: true
env: []
web_ui:
  port: 8090
  path: /
