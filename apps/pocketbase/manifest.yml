name: PocketBase
slug: pocketbase
type: docker
description: PocketBase application imported from CasaOS catalog
tagline: PocketBase application imported from CasaOS catalog
category: tools
developer:
  name: CasaOS Team
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
