name: Portainer
slug: portainer
type: docker
description: Manage Docker containers, images, and networks visually
tagline: Container management UI
category: tools
developer:
  name: Cp0204
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8000
  host: 8000
  description: Service port 8000
  protocol: tcp
- container: 9000
  host: 9000
  description: Service port 9000
  protocol: tcp
- container: 9443
  host: 9443
  description: Service port 9443
  protocol: tcp
volumes:
- container: /data
  description: App data storage
  required: true
- container: /var/run/docker.sock
  description: Mount for /var/run/docker.sock
  required: false
env: []
web_ui:
  port: 8000
  path: /
