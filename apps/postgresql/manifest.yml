name: PostgreSQL
slug: postgresql
type: docker
description: Powerful open-source SQL database for any workload
tagline: Advanced relational database
category: tools
developer:
  name: WisdomSky
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 5432
  host: 5432
  description: Service port 5432
  protocol: tcp
volumes:
- container: /var/lib/postgresql/data
  description: App data storage
  required: true
env:
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
- name: POSTGRES_USER
  default: casaos
  description: POSTGRES_USER environment variable
  advanced: true
- name: POSTGRES_PASSWORD
  default: casaos
  description: POSTGRES_PASSWORD environment variable
  advanced: true
- name: POSTGRES_DB
  default: casaos
  description: POSTGRES_DB environment variable
  advanced: true
web_ui:
  port: 5432
  path: /
