name: Prowlarr
slug: prowlarr
type: docker
description: Manage torrent and Usenet indexers in one place
tagline: Indexer manager for the *arr stack
category: tools
developer:
  name: Prowlarr Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 9696
  host: 9696
  description: Service port 9696
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
env:
- name: PGID
  default: '1000'
  description: PGID environment variable
  advanced: true
- name: PUID
  default: '1000'
  description: PUID environment variable
  advanced: true
- name: TZ
  default: Europe/London
  description: TZ environment variable
  advanced: true
web_ui:
  port: 9696
  path: /
