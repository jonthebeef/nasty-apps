name: Prowlarr
slug: prowlarr
type: docker
description: Prowlarr is an indexer manager/proxy built on the popular *arr .net/reactjs
  base stack to integrate with your various PVR apps. Prowlarr supports management
  of both Torrent Trackers and Usenet Indexers. It integrates seamlessly with Lidarr,
  Mylar3, Radarr, Readarr, and Sonarr offering complete management of your indexers
  with no per app Indexer setup required (we do it all).
tagline: Integration of various PVR applications
category: tools
developer:
  name: Prowlarr Team
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Prowlarr/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Prowlarr/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Prowlarr/screenshot-2.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 9696
  host: 9696
  description: Service port 9696
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
env:
- name: PGID
  default: '1000'
  description: PGID environment variable
  advanced: true
- name: PUID
  default: '1000'
  description: PUID environment variable
  advanced: true
- name: TZ
  default: Europe/London
  description: TZ environment variable
  advanced: true
web_ui:
  port: 9696
  path: /
