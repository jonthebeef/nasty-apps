name: PsiTransfer
slug: psitransfer
type: docker
description: Share files with auto-expiring download links
tagline: Simple file sharing
category: tools
developer:
  name: psitrax
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/PsiTransfer/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/PsiTransfer/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/PsiTransfer/screenshot-2.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3000
  host: 13001
  description: Service port 3000
  protocol: tcp
volumes:
- container: /data
  description: App data storage
  required: true
env:
- name: PSITRANSFER_ADMIN_PASS
  default: secret
  description: PSITRANSFER_ADMIN_PASS environment variable
  advanced: true
web_ui:
  port: 13001
  path: /
