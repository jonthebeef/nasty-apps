name: PyLoad
slug: pyload
type: docker
description: Automate downloads from file hosting services
tagline: Download manager
category: tools
developer:
  name: joaobosconff
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8000
  host: 8000
  description: Service port 8000
  protocol: tcp
- container: 9666
  host: 9666
  description: Service port 9666
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
- container: /downloads
  description: Mount for /downloads
  required: false
env:
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 8000
  path: /
