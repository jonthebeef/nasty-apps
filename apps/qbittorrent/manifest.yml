name: QBittorrent
slug: qbittorrent
type: docker
description: QBittorrent application imported from CasaOS catalog
tagline: QBittorrent application imported from CasaOS catalog
category: tools
developer:
  name: CasaOS Team
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 8080
    host: 8181
    description: Service port 8080
    protocol: tcp
volumes:
  - container: /config
    description: App configuration
    required: true
  - container: /DATA
    description: App data storage
    required: true
env:
  - name: PGID
    default: $PGID
    description: PGID environment variable
    advanced: true
  - name: PUID
    default: $PUID
    description: PUID environment variable
    advanced: true
  - name: TZ
    default: $TZ
    description: TZ environment variable
    advanced: true
  - name: UMASK
    default: '002'
    description: UMASK environment variable
    advanced: true
web_ui:
  port: 8181
  path: /
