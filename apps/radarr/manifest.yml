name: Radarr
slug: radarr
type: docker
description: Automatically download and organise your movie library
tagline: Movie collection manager
category: media
developer:
  name: Radarr Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 7878
  host: 7878
  description: Service port 7878
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
- container: /movies
  description: Mount for /movies
  required: false
- container: /downloads
  description: Mount for /downloads
  required: false
env:
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 7878
  path: /
