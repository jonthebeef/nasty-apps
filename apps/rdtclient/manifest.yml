name: RDTClient
slug: rdtclient
type: docker
description: RDTClient application imported from CasaOS catalog
tagline: RDTClient application imported from CasaOS catalog
category: tools
developer:
  name: calganaygun
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 6500
    host: 6500
    description: Service port 6500
    protocol: tcp
volumes:
  - container: /data/downloads
    description: App data storage
    required: true
  - container: /data/db
    description: App data storage
    required: true
env:
  - name: PGID
    default: $PGID
    description: PGID environment variable
    advanced: true
  - name: PUID
    default: $PUID
    description: PUID environment variable
    advanced: true
  - name: TZ
    default: $TZ
    description: TZ environment variable
    advanced: true
  - name: UMASK
    default: '002'
    description: UMASK environment variable
    advanced: true
web_ui:
  port: 6500
  path: /
