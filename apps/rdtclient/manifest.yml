name: RDTClient
slug: rdtclient
type: docker
description: Download torrents through Real-Debrid cloud service
tagline: Real-Debrid torrent client
category: tools
developer:
  name: calganaygun
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/RDTClient/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/RDTClient/screenshot-1.png
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 6500
  host: 6500
  description: Service port 6500
  protocol: tcp
volumes:
- container: /data/downloads
  description: App data storage
  required: true
- container: /data/db
  description: App data storage
  required: true
env:
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
- name: UMASK
  default: '002'
  description: UMASK environment variable
  advanced: true
web_ui:
  port: 6500
  path: /
