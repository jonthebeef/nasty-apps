name: Readarr
slug: readarr
type: docker
description: Readarr is a ebook collection manager for Usenet and BitTorrent users.
  It can monitor multiple RSS feeds for new books from your favorite authors and will
  interface with clients and indexers to grab, sort, and rename them.
tagline: Ebook and audiobook collection manager for Usenet and BitTorrent users.
category: media
developer:
  name: Readarr Team
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Readarr/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Readarr/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Readarr/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Readarr/screenshot-3.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Readarr/screenshot-4.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8787
  host: 8787
  description: Service port 8787
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
- container: /books
  description: Mount for /books
  required: false
- container: /downloads
  description: Mount for /downloads
  required: false
env:
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 8787
  path: /
