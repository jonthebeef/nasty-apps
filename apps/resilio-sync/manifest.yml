name: Resilio Sync
slug: resilio-sync
type: docker
description: Resilio Sync application imported from CasaOS catalog
tagline: Resilio Sync application imported from CasaOS catalog
category: tools
developer:
  name: self
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 55555
    host: 55555
    description: Service port 55555
    protocol: tcp
  - container: 8888
    host: 8888
    description: Service port 8888
    protocol: tcp
volumes:
  - container: /sync
    description: Mount for /sync
    required: false
  - container: /config
    description: App configuration
    required: true
  - container: /downloads
    description: Mount for /downloads
    required: false
env:
  - name: PGID
    default: $PGID
    description: PGID environment variable
    advanced: true
  - name: PUID
    default: $PUID
    description: PUID environment variable
    advanced: true
  - name: TZ
    default: $TZ
    description: TZ environment variable
    advanced: true
web_ui:
  port: 55555
  path: /
