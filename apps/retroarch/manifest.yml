name: RetroArch
slug: retroarch
type: docker
description: Play retro games from dozens of classic consoles
tagline: Multi-system game emulator
category: tools
developer:
  name: inglebard
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/RetroArch/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/RetroArch/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/RetroArch/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/RetroArch/screenshot-3.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 80
  host: 8183
  description: Web interface
  protocol: tcp
volumes: []
env:
- name: ROOT_WWW_PATH
  default: '"/var/www/html"'
  description: ROOT_WWW_PATH environment variable
  advanced: true
web_ui:
  port: 8183
  path: /
