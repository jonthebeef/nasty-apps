name: Siyuan Note
slug: siyuan-note
type: docker
description: Siyuan Note application imported from CasaOS catalog
tagline: Siyuan Note application imported from CasaOS catalog
category: tools
developer:
  name: CasaOS Team
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
  - arm
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 6806
    host: 6806
    description: Service port 6806
    protocol: tcp
volumes:
  - container: /siyuan/workspace
    description: Mount for /siyuan/workspace
    required: false
env:
  - name: PUID
    default: '1000'
    description: PUID environment variable
    advanced: true
  - name: PGID
    default: '1000'
    description: PGID environment variable
    advanced: true
web_ui:
  port: 6806
  path: /
