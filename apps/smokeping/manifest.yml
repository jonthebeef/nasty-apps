name: Smokeping
slug: smokeping
type: docker
description: Track network performance and packet loss over time
tagline: Network latency monitor
category: network-and-dns
developer:
  name: Smokeping Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 80
  host: 10280
  description: Web interface
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
- container: /data
  description: App data storage
  required: true
env:
- name: PGID
  default: '1000'
  description: PGID environment variable
  advanced: true
- name: PUID
  default: '1000'
  description: PUID environment variable
  advanced: true
- name: TZ
  default: Europe/London
  description: TZ environment variable
  advanced: true
web_ui:
  port: 10280
  path: /
