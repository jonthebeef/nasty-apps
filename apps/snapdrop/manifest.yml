name: Snapdrop
slug: snapdrop
type: docker
description: Snapdrop is a Progressive Web App (PWA) that allows you to transfer files
  between devices in the same network without having to install anything.
tagline: Cross-platform file sharing made easy.
category: tools
developer:
  name: self
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Snapdrop/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Snapdrop/screenshot-1.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 443
  host: 443
  description: Web interface
  protocol: tcp
- container: 80
  host: 89
  description: Web interface
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
env:
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 443
  path: /
