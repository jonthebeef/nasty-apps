name: Snapdrop
slug: snapdrop
type: docker
description: Snapdrop application imported from CasaOS catalog
tagline: Snapdrop application imported from CasaOS catalog
category: tools
developer:
  name: self
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 443
    host: 443
    description: Web interface
    protocol: tcp
  - container: 80
    host: 89
    description: Web interface
    protocol: tcp
volumes:
  - container: /config
    description: App configuration
    required: true
env:
  - name: PGID
    default: $PGID
    description: PGID environment variable
    advanced: true
  - name: PUID
    default: $PUID
    description: PUID environment variable
    advanced: true
  - name: TZ
    default: $TZ
    description: TZ environment variable
    advanced: true
web_ui:
  port: 443
  path: /
