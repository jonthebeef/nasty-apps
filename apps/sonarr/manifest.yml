name: Sonarr
slug: sonarr
type: docker
description: Sonarr is a PVR for Usenet and BitTorrent users. It can monitor multiple
  RSS feeds for new episodes of your favorite shows and will grab, sort and rename
  them. It can also be configured to automatically upgrade the quality of files already
  downloaded when a better quality format becomes available.
tagline: The PVR for Usenet and BitTorrent users
category: media
developer:
  name: Sonarr
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Sonarr/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Sonarr/screenshot-1.jpg
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Sonarr/screenshot-2.jpg
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Sonarr/screenshot-3.jpg
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Sonarr/screenshot-4.jpg
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8989
  host: 8989
  description: Service port 8989
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
- container: /tv
  description: Mount for /tv
  required: false
- container: /downloads
  description: Mount for /downloads
  required: false
env:
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 8989
  path: /
