name: Sonarr
slug: sonarr
type: docker
description: Sonarr application imported from CasaOS catalog
tagline: Sonarr application imported from CasaOS catalog
category: media
developer:
  name: CasaOS Team
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 8989
    host: 8989
    description: Service port 8989
    protocol: tcp
volumes:
  - container: /config
    description: App configuration
    required: true
  - container: /tv
    description: Mount for /tv
    required: false
  - container: /downloads
    description: Mount for /downloads
    required: false
env:
  - name: PGID
    default: $PGID
    description: PGID environment variable
    advanced: true
  - name: PUID
    default: $PUID
    description: PUID environment variable
    advanced: true
  - name: TZ
    default: $TZ
    description: TZ environment variable
    advanced: true
web_ui:
  port: 8989
  path: /
