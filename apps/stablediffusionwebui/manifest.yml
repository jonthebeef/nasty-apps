name: StableDiffusionWebUI
slug: stablediffusionwebui
type: docker
description: Stable Diffusion is a deep learning, text-to-image model released in
  2022 based on diffusion techniques. It is primarily used to generate detailed images
  conditioned on text descriptions, though it can also be applied to other tasks such
  as inpainting, outpainting, and generating image-to-image translations guided by
  a text prompt.
tagline: An AI model used to generate images conditioned on text descriptions.
category: tools
developer:
  name: stability.ai
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/StableDiffusionWebUI/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/StableDiffusionWebUI/screenshot-1.jpg
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/StableDiffusionWebUI/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/StableDiffusionWebUI/screenshot-3.webp
arch:
- amd64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 7860
  host: 7860
  description: Service port 7860
  protocol: tcp
volumes:
- container: /data/models
  description: App data storage
  required: true
- container: /data/outputs
  description: App data storage
  required: true
- container: /data/config
  description: App configuration
  required: true
env:
- name: NVIDIA_VISIBLE_DEVICES
  default: all
  description: NVIDIA_VISIBLE_DEVICES environment variable
  advanced: true
- name: CPU_FALLBACK
  default: 'true'
  description: CPU_FALLBACK environment variable
  advanced: true
web_ui:
  port: 7860
  path: /
