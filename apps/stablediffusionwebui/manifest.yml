name: StableDiffusionWebUI
slug: stablediffusionwebui
type: docker
description: StableDiffusionWebUI application imported from CasaOS catalog
tagline: StableDiffusionWebUI application imported from CasaOS catalog
category: tools
developer:
  name: Unknown
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 7860
    host: 7860
    description: Service port 7860
    protocol: tcp
volumes:
  - container: /data/models
    description: App data storage
    required: true
  - container: /data/outputs
    description: App data storage
    required: true
  - container: /data/config
    description: App configuration
    required: true
env:
  - name: NVIDIA_VISIBLE_DEVICES
    default: all
    description: NVIDIA_VISIBLE_DEVICES environment variable
    advanced: true
  - name: CPU_FALLBACK
    default: 'true'
    description: CPU_FALLBACK environment variable
    advanced: true
web_ui:
  port: 7860
  path: /
