name: Stremio
slug: stremio
type: docker
description: Stremio application imported from CasaOS catalog
tagline: Stremio application imported from CasaOS catalog
category: media
developer:
  name: joaobosconff
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 11470
    host: 11470
    description: Service port 11470
    protocol: tcp
  - container: 8080
    host: 8100
    description: Service port 8080
    protocol: tcp
volumes:
  - container: /root/.stremio-server
    description: Mount for /root/.stremio-server
    required: false
env:
  - name: NO_CORS
    default: '1'
    description: NO_CORS environment variable
    advanced: true
  - name: AUTO_SERVER_URL
    default: '1'
    description: AUTO_SERVER_URL environment variable
    advanced: true
web_ui:
  port: 11470
  path: /
