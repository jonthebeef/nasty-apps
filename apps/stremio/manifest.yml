name: Stremio
slug: stremio
type: docker
description: Stremio offers a secure, modern and seamless entertainment experience.
  With its easy-to-use interface and diverse content library, including 4K HDR support,
  users can enjoy their favorite movies and TV shows across all their devices. And
  with its commitment to security, Stremio is the ultimate choice for a worry-free,
  high-quality streaming experience.
tagline: Stremio is a modern media center that gives you the freedom to watch everything
  you want.
category: media
developer:
  name: Andreas Tsarida / Stremio
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Stremio/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Stremio/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Stremio/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Stremio/screenshot-3.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 11470
  host: 11470
  description: Service port 11470
  protocol: tcp
- container: 8080
  host: 8100
  description: Service port 8080
  protocol: tcp
volumes:
- container: /root/.stremio-server
  description: Mount for /root/.stremio-server
  required: false
env:
- name: NO_CORS
  default: '1'
  description: NO_CORS environment variable
  advanced: true
- name: AUTO_SERVER_URL
  default: '1'
  description: AUTO_SERVER_URL environment variable
  advanced: true
web_ui:
  port: 11470
  path: /
