name: SwingMusic
slug: swingmusic
type: docker
description: SwingMusic application imported from CasaOS catalog
tagline: SwingMusic application imported from CasaOS catalog
category: media
developer:
  name: SwingMX
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 1970
    host: 1970
    description: Service port 1970
    protocol: tcp
volumes:
  - container: /config
    description: App configuration
    required: true
  - container: /music
    description: Mount for /music
    required: false
env: []
web_ui:
  port: 1970
  path: /
