name: Syncthing
slug: syncthing
type: docker
description: Syncthing application imported from CasaOS catalog
tagline: Syncthing application imported from CasaOS catalog
category: tools
developer:
  name: CasaOS Team
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 8384
    host: 8384
    description: Service port 8384
    protocol: tcp
  - container: 22000
    host: 22000
    description: Service port 22000
    protocol: tcp
  - container: 22000
    host: 22000
    description: Service port 22000
    protocol: udp
  - container: 21027
    host: 21027
    description: Service port 21027
    protocol: udp
volumes:
  - container: /config
    description: App configuration
    required: true
  - container: /DATA
    description: App data storage
    required: true
env:
  - name: PGID
    default: $PGID
    description: PGID environment variable
    advanced: true
  - name: PUID
    default: $PUID
    description: PUID environment variable
    advanced: true
  - name: TZ
    default: $TZ
    description: TZ environment variable
    advanced: true
web_ui:
  port: 8384
  path: /
