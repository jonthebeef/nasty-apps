name: Tailscale
slug: tailscale
type: docker
description: Connect your devices securely with WireGuard-based mesh networking
tagline: Zero-config VPN
category: network-and-dns
developer:
  name: Tailscale Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm
- arm64
- '386'
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports: []
volumes:
- container: /var/lib/tailscale
  description: Mount for /var/lib/tailscale
  required: false
- container: /dev/net/tun
  description: Mount for /dev/net/tun
  required: false
env:
- name: TS_STATE_DIR
  default: /var/lib/tailscale
  description: TS_STATE_DIR environment variable
  advanced: true
