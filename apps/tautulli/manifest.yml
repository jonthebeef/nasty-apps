name: Tautulli
slug: tautulli
type: docker
description: Tautulli application imported from CasaOS catalog
tagline: Tautulli application imported from CasaOS catalog
category: media
developer:
  name: Triskae
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 8181
    host: 8181
    description: Service port 8181
    protocol: tcp
volumes:
  - container: /config
    description: App configuration
    required: true
env:
  - name: PGID
    default: '1000'
    description: PGID environment variable
    advanced: true
  - name: PUID
    default: '1000'
    description: PUID environment variable
    advanced: true
  - name: TZ
    default: Europe/London
    description: TZ environment variable
    advanced: true
web_ui:
  port: 8181
  path: /
