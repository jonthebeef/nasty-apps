name: Threadfin
slug: threadfin
type: docker
description: Threadfin application imported from CasaOS catalog
tagline: Threadfin application imported from CasaOS catalog
category: tools
developer:
  name: Fabio Tea
  website: ''
icon: icon.png
screenshots: []
arch:
  - amd64
  - arm64
  - arm
attribution: CasaOS App Store
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
  - container: 34400
    host: 34400
    description: Service port 34400
    protocol: tcp
volumes:
  - container: /home/threadfin/conf/data
    description: App data storage
    required: true
  - container: /home/threadfin/conf/backup
    description: Mount for /home/threadfin/conf/backup
    required: false
env:
  - name: THREADFIN_BRANCH
    default: main
    description: THREADFIN_BRANCH environment variable
    advanced: true
  - name: THREADFIN_DEBUG
    default: '0'
    description: THREADFIN_DEBUG environment variable
    advanced: true
web_ui:
  port: 34400
  path: /
