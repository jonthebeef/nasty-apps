name: Unifi Network Application
slug: unifi-network-application
type: docker
description: 'Only mandatory ports are enabled by default, to extend functionality
  consider exposing 1900:1900/udp, 8843:8843, 8880:8880, 6789:6789, 5514:5514/udp.

  Other ports specifications [here](https://docs.linuxserver.io/images/docker-unifi-network-application/#ports-p).


  Because the network application runs inside Docker by default it uses an IP address
  not accessible by other devices.

  So, for it to adopt other devices, it is required to use port `8080` and change
  the inform IP address. To do so, go in settings and search for the `Inform Host`
  option, there select override and set the address to that of the host.

  Often, it is also needed to ssh into the devices you want to adopt and manually
  set the inform IP address, the command needed for doing so is `set-inform http://HOST-ADDRESS:8080/inform`.


  For more [information](https://docs.linuxserver.io/images/docker-unifi-network-application/)'
tagline: The Unifi network application software is a powerful, enterprise wireless
  software engine ideal for high-density client deployments requiring low latency
  and high uptime performance.
category: network-and-dns
developer:
  name: Ubiquiti and Linuxserver.io
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Unifi-Network-Application/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Unifi-Network-Application/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Unifi-Network-Application/screenshot-2.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 8443
  host: 8443
  description: Service port 8443
  protocol: tcp
- container: 3478
  host: 3478
  description: Service port 3478
  protocol: udp
- container: 10001
  host: 10001
  description: Service port 10001
  protocol: udp
- container: 8080
  host: 8080
  description: Service port 8080
  protocol: tcp
volumes:
- container: /config
  description: App configuration
  required: true
env:
- name: MONGO_DBNAME
  default: unifi-db
  description: MONGO_DBNAME environment variable
  advanced: true
- name: MONGO_HOST
  default: unifi-db
  description: MONGO_HOST environment variable
  advanced: true
- name: MONGO_PASS
  default: pass
  description: MONGO_PASS environment variable
  advanced: true
- name: MONGO_PORT
  default: '27017'
  description: MONGO_PORT environment variable
  advanced: true
- name: MONGO_USER
  default: unifi
  description: MONGO_USER environment variable
  advanced: true
- name: PGID
  default: $PGID
  description: PGID environment variable
  advanced: true
- name: PUID
  default: $PUID
  description: PUID environment variable
  advanced: true
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 8443
  path: /
