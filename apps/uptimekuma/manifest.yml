name: UptimeKuma
slug: uptimekuma
type: docker
description: Monitor your websites and services with alerts
tagline: Uptime monitoring
category: network-and-dns
developer:
  name: UptimeKuma Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
- arm
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3001
  host: 3001
  description: Service port 3001
  protocol: tcp
volumes:
- container: /app/data
  description: App data storage
  required: true
env: []
web_ui:
  port: 3001
  path: /
