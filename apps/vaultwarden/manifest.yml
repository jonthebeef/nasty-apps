name: Vaultwarden
slug: vaultwarden
type: docker
description: Self-hosted Bitwarden-compatible password vault
tagline: Lightweight password manager
category: tools
developer:
  name: Vaultwarden Project
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 80
  host: 10380
  description: Web interface
  protocol: tcp
volumes:
- container: /data
  description: App data storage
  required: true
env: []
web_ui:
  port: 10380
  path: /
