name: Vaultwarden
slug: vaultwarden
type: docker
description: Alternative implementation of the Bitwarden server API written in Rust
  and compatible with upstream Bitwarden clients*, perfect for self-hosted deployment
  where running the official resource-heavy service might not be ideal.
tagline: A self-hosted Bitwarden server
category: tools
developer:
  name: Daniel García
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Vaultwarden/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Vaultwarden/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Vaultwarden/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Vaultwarden/screenshot-3.png
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 80
  host: 10380
  description: Web interface
  protocol: tcp
volumes:
- container: /data
  description: App data storage
  required: true
env: []
web_ui:
  port: 10380
  path: /
