name: VirtualMachineManager
slug: virtualmachinemanager
type: docker
description: Create and manage virtual machines from a web UI
tagline: Virtual machine manager
category: tools
developer:
  name: mber5
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 80
  host: 8185
  description: Web interface
  protocol: tcp
volumes:
- container: /var/run/libvirt/libvirt-sock
  description: Mount for /var/run/libvirt/libvirt-sock
  required: false
- container: /var/lib/libvirt
  description: Mount for /var/lib/libvirt
  required: false
- container: /DATA/Downloads
  description: App data storage
  required: true
env:
- name: DARK_MODE
  default: 'false'
  description: DARK_MODE environment variable
  advanced: true
- name: HOSTS
  default: '[''qemu:///system'']'
  description: HOSTS environment variable
  advanced: true
web_ui:
  port: 8185
  path: /
