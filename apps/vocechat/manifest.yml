name: VoceChat
slug: vocechat
type: docker
description: Self-hosted messaging for small teams
tagline: Lightweight team chat
category: tools
developer:
  name: Privoce
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 3000
  host: 3009
  description: Service port 3000
  protocol: tcp
volumes:
- container: /home/vocechat-server/data
  description: App data storage
  required: true
env:
- name: TZ
  default: $TZ
  description: TZ environment variable
  advanced: true
web_ui:
  port: 3009
  path: /
