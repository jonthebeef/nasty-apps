name: Wallabag
slug: wallabag
type: docker
description: Save web articles to read offline at your own pace
tagline: Read-it-later service
category: tools
developer:
  name: wallabag
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Wallabag/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Wallabag/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Wallabag/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/Wallabag/screenshot-3.png
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 80
  host: 25661
  description: Web interface
  protocol: tcp
volumes:
- container: /var/www/wallabag/web/assets/images
  description: Mount for /var/www/wallabag/web/assets/images
  required: false
env:
- name: SYMFONY__ENV__DOMAIN_NAME
  default: http://<IP>:25661
  description: SYMFONY__ENV__DOMAIN_NAME environment variable
  advanced: true
- name: SYMFONY__ENV__SERVER_NAME
  default: Wallabag
  description: SYMFONY__ENV__SERVER_NAME environment variable
  advanced: true
web_ui:
  port: 25661
  path: /
