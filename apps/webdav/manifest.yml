name: WebDav
slug: webdav
type: docker
description: WebDAV is a web-based protocol that allows you to share and manage files
  over the internet, providing a collaborative environment for file editing and versioning.
tagline: A web-based file sharing and management protocol
category: tools
developer:
  name: CasaOS Team
  website: ''
icon: https://icon.casaos.io/main/all/webdav.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/WebDAV/screenshot-1.png
arch:
- amd64
- '386'
- arm64
- arm
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 80
  host: 5005
  description: Web interface
  protocol: tcp
volumes:
- container: /media
  description: Media library
  required: true
  hint: Path to your movies, TV shows, and music
env:
- name: GID
  default: '1000'
  description: GID environment variable
  advanced: true
- name: PASSWORD
  default: casaos
  description: PASSWORD environment variable
  advanced: true
- name: TZ
  default: Europe/Madrid
  description: TZ environment variable
  advanced: true
- name: UDI
  default: '1000'
  description: UDI environment variable
  advanced: true
- name: USERNAME
  default: casaos
  description: USERNAME environment variable
  advanced: true
web_ui:
  port: 5005
  path: /
