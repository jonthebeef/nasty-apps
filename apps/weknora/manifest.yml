name: WeKnora
slug: weknora
type: docker
description: Organise notes and knowledge with linked references
tagline: Knowledge management tool
category: tools
developer:
  name: tencent
  website: ''
icon: icon.png
screenshots: []
arch:
- amd64
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 80
  host: 1080
  description: Web interface
  protocol: tcp
volumes: []
env:
- name: MAX_FILE_SIZE_MB
  default: '50'
  description: MAX_FILE_SIZE_MB environment variable
  advanced: true
web_ui:
  port: 1080
  path: /
