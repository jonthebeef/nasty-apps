name: WireGuardEasy
slug: wireguardeasy
type: docker
description: You have found the easiest way to install & manage WireGuard on any Linux
  host!
tagline: WEB UI to manage WireGuard VPN.
category: network-and-dns
developer:
  name: WeejeWel
  website: ''
icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/WireGuardEasy/icon.png
screenshots:
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/WireGuardEasy/screenshot-1.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/WireGuardEasy/screenshot-2.png
- https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/WireGuardEasy/screenshot-3.png
arch:
- amd64
- arm
- arm64
resources:
  min_ram: 512
  profiles:
    light:
      ram: 256
      cpu: 0.5
    standard:
      ram: 512
      cpu: 1
    performance:
      ram: 1024
      cpu: 2
ports:
- container: 51820
  host: 51820
  description: Service port 51820
  protocol: udp
- container: 51821
  host: 51821
  description: Service port 51821
  protocol: tcp
volumes:
- container: /etc/wireguard
  description: Mount for /etc/wireguard
  required: false
env:
- name: PASSWORD
  default: casaos
  description: PASSWORD environment variable
  advanced: true
- name: WG_HOST
  default: casaos.local
  description: WG_HOST environment variable
  advanced: true
- name: WG_PORT
  default: '51820'
  description: WG_PORT environment variable
  advanced: true
- name: WG_DEFAULT_DNS
  default: 1.1.1.1
  description: WG_DEFAULT_DNS environment variable
  advanced: true
web_ui:
  port: 51820
  path: /
